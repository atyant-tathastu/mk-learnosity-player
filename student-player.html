  relBtns.forEach(b => b.addEventListener('click', () => submit(b.dataset.rel)));
  nextBtn.addEventListener('click', () => { if (idx < rounds.length - 1) { idx += 1; renderRound(); } else nextBtn.disabled = true; });
  renderRound();
  return wrap;
}
// Step 2 (L1.2) — multiply two fractions by overlapping a grid.
// Pure exploration: the product (green overlap) is shown; the discovery
// question (a separate FIB) is the gate.
function buildFractionMultiplierGrid(cfg, instruction, onSolved) {
  cfg = cfg || {};
  const parse = (s, n, d) => { const m = String(s || '').split('/').map(Number); return [m[0] || n, m[1] || d]; };
  // Optional multi-round mode: cfg.rounds = [{a, b, locked, note}, ...].
  // Each round defines a pair to predict; locked rounds freeze the sliders so
  // the student must verify the specified pair. Backward-compatible: if no
  // rounds, behaves as a single-check applet using initial_a/initial_b.
  const rounds = Array.isArray(cfg.rounds) && cfg.rounds.length > 0 ? cfg.rounds : null;
  let currentRound = 0;
  const firstPair = rounds ? rounds[0] : { a: cfg.initial_a, b: cfg.initial_b };
  let [aN, aD] = parse(firstPair.a, 1, 2);
  let [bN, bD] = parse(firstPair.b, 1, 3);
  let solved = false;
  const wrap = document.createElement('div');
  wrap.className = 'applet';
  const badgeHtml = rounds ? `<div class="applet-label" data-role="round-badge" style="margin-top:4px;background:#F4ECFB;color:#5B2A86">Round 1 of ${rounds.length}</div>` : '';
  const noteHtml = rounds ? `<div class="applet-prompt" data-role="round-note" style="font-style:italic;color:#555"></div>` : '';
  wrap.innerHTML = `
    <div class="applet-label">Interactive · fraction-multiplier-grid</div>
    ${badgeHtml}
    ${instruction ? `<div class="applet-prompt">${instruction}</div>` : ''}
    ${noteHtml}
    <div class="applet-svg-host" data-role="grid"></div>
    <div style="display:flex;flex-wrap:wrap;gap:14px;align-items:center;font-size:12px;color:#555;margin:6px 0 4px">
      <span style="display:inline-flex;align-items:center;gap:5px"><span style="display:inline-block;width:14px;height:14px;background:#F8ECF8;border:1px solid #999"></span>A's columns</span>
      <span style="display:inline-flex;align-items:center;gap:5px"><span style="display:inline-block;width:14px;height:14px;background:#E5F4FB;border:1px solid #999"></span>B's rows</span>
      <span style="display:inline-flex;align-items:center;gap:5px"><span style="display:inline-block;width:14px;height:14px;background:transparent;border:2px solid #149A55"></span>green outline = product</span>
    </div>
    <div class="applet-controls">
      <label>A — shaded columns <input type="range" min="1" max="6" value="${aN}" data-role="aN"><span class="applet-val" data-role="aN-v"></span></label>
      <label>of columns <input type="range" min="2" max="6" value="${aD}" data-role="aD"><span class="applet-val" data-role="aD-v"></span></label>
    </div>
    <div class="applet-controls">
      <label>B — shaded rows <input type="range" min="1" max="6" value="${bN}" data-role="bN"><span class="applet-val" data-role="bN-v"></span></label>
      <label>of rows <input type="range" min="2" max="6" value="${bD}" data-role="bD"><span class="applet-val" data-role="bD-v"></span></label>
    </div>
    <div class="applet-prompt" data-role="check-head"></div>
    <div class="applet-controls">
      <span>Your answer:</span>
      <span class="stacked-frac"
        ><span class="num"><input class="fib-input" type="number" min="0" inputmode="numeric" data-role="inN" placeholder="?"></span
        ><span class="bar"></span
        ><span class="den"><input class="fib-input" type="number" min="1" inputmode="numeric" data-role="inD" placeholder="?"></span
      ></span>
      <button class="applet-btn" data-role="check">Check</button>
    </div>
    <div class="applet-feedback" data-role="feedback"></div>
    <div class="applet-result" data-role="result"></div>
  `;
  const Q = s => wrap.querySelector(s);
  const host = Q('[data-role="grid"]'), result = Q('[data-role="result"]');
  const checkHead = Q('[data-role="check-head"]');
  const feedback = Q('[data-role="feedback"]');
  const inN = Q('[data-role="inN"]'), inD = Q('[data-role="inD"]');
  const checkBtn = Q('[data-role="check"]');
  const roundBadge = Q('[data-role="round-badge"]');
  const roundNote = Q('[data-role="round-note"]');
  const E = {}; ['aN', 'aD', 'bN', 'bD'].forEach(k => { E[k] = Q(`[data-role="${k}"]`); E[k + 'v'] = Q(`[data-role="${k}-v"]`); });
  function lockSliders(locked) {
    ['aN', 'aD', 'bN', 'bD'].forEach(k => {
      E[k].disabled = !!locked;
      E[k].style.opacity = locked ? '0.55' : '1';
      E[k].style.cursor = locked ? 'not-allowed' : '';
    });
  }
  function applyRound(idx) {
    const r = rounds[idx];
    if (r.a) [aN, aD] = parse(r.a, aN, aD);
    if (r.b) [bN, bD] = parse(r.b, bN, bD);
    E.aN.value = aN; E.aD.value = aD; E.bN.value = bN; E.bD.value = bD;
    lockSliders(!!r.locked);
    if (roundBadge) roundBadge.textContent = `Round ${idx + 1} of ${rounds.length}`;
    if (roundNote) {
      if (r.note) { roundNote.textContent = r.note; roundNote.style.display = ''; }
      else { roundNote.textContent = ''; roundNote.style.display = 'none'; }
    }
    drawGrid();
  }
  function drawGrid() {
    aD = +E.aD.value; bD = +E.bD.value;
    E.aN.max = aD; E.bN.max = bD;
    aN = Math.min(+E.aN.value, aD); bN = Math.min(+E.bN.value, bD);
    E.aN.value = aN; E.bN.value = bN;
    E.aNv.textContent = aN; E.aDv.textContent = aD; E.bNv.textContent = bN; E.bDv.textContent = bD;
    const S = 240, cw = S / aD, ch = S / bD;
    // Layered rendering: A's shaded columns are ONE block full height
    // (purple), B's shaded rows are ONE block full width (blue, semi-
    // transparent so it visibly mixes with A in the overlap). Cell-level
    // grid lines sit on top so cells are countable. A thick green outline
    // marks the overlap region — that's the product the student predicts.
    const COL_TINT = '#F8ECF8';   // A's columns — light purple
    const ROW_TINT = '#E5F4FB';   // B's rows — light blue
    let svgBody = '';
    if (aN > 0) {
      svgBody += `<rect x="0" y="0" width="${(aN * cw).toFixed(1)}" height="${S}" fill="${COL_TINT}"/>`;
    }
    if (bN > 0) {
      svgBody += `<rect x="0" y="0" width="${S}" height="${(bN * ch).toFixed(1)}" fill="${ROW_TINT}" fill-opacity="0.75"/>`;
    }
    for (let r = 0; r < bD; r++) for (let c = 0; c < aD; c++) {
      svgBody += `<rect x="${(c * cw).toFixed(1)}" y="${(r * ch).toFixed(1)}" width="${cw.toFixed(1)}" height="${ch.toFixed(1)}" fill="none" stroke="#999" stroke-width="1"/>`;
    }
    if (aN > 0 && bN > 0) {
      svgBody += `<rect x="0" y="0" width="${(aN * cw).toFixed(1)}" height="${(bN * ch).toFixed(1)}" fill="none" stroke="${GREEN_OUTLINE}" stroke-width="3.5"/>`;
    }
    host.innerHTML = `<svg viewBox="0 0 ${S} ${S}" width="${S}" height="${S}" style="max-width:100%;height:auto">${svgBody}</svg>`;
    // The check prompt mirrors whatever the sliders are set to right now.
    checkHead.innerHTML = `Predict the product: \\(\\dfrac{${aN}}{${aD}}\\) × \\(\\dfrac{${bN}}{${bD}}\\) = ?`;
    if (window.renderMathInElement) renderMathInElement(checkHead, { delimiters: [{ left: '\\(', right: '\\)', display: false }], throwOnError: false });
    // Reset the check state whenever the configuration changes.
    feedback.className = 'applet-feedback';
    feedback.textContent = '';
    result.innerHTML = '';
    inN.value = ''; inD.value = '';
  }
  function check() {
    const pN = aN * bN, pD = aD * bD;
    const n = Number(inN.value), d = Number(inD.value);
    if (!Number.isInteger(n) || !Number.isInteger(d) || d <= 0) {
      feedback.className = 'applet-feedback bad';
      feedback.textContent = 'Enter both numbers — top and bottom.';
      return;
    }
    const ok = (n === pN && d === pD) || (n * pD === d * pN);
    if (ok) {
      feedback.className = 'applet-feedback good';
      feedback.innerHTML = `✓ Correct — ${pN} cells inside the green outline, out of ${pD} total.`;
      result.innerHTML = `\\(\\dfrac{${aN}}{${aD}}\\) × \\(\\dfrac{${bN}}{${bD}}\\) = <strong>\\(\\dfrac{${pN}}{${pD}}\\)</strong>`;
      if (window.renderMathInElement) renderMathInElement(result, { delimiters: [{ left: '\\(', right: '\\)', display: false }], throwOnError: false });
      SoundEngine.playCorrect();
      if (rounds) {
        if (currentRound < rounds.length - 1) {
          // Pause briefly so the student reads the success message, then advance.
          setTimeout(() => { currentRound++; applyRound(currentRound); }, 1400);
        } else if (!solved && typeof onSolved === 'function') {
          solved = true; onSolved();
        }
      } else if (!solved && typeof onSolved === 'function') {
        solved = true; onSolved();
      }
    } else {
      feedback.className = 'applet-feedback bad';
      feedback.textContent = 'Not quite — count the cells inside the green outline, then the total cells.';
      SoundEngine.playIncorrect();
    }
  }
  ['aN', 'aD', 'bN', 'bD'].forEach(k => E[k].addEventListener('input', drawGrid));
  checkBtn.addEventListener('click', check);
  if (rounds) applyRound(0);
  else drawGrid();
  return wrap;
}

// Step 5 (L1.2) — a fraction of a quantity. Pick a total and a fraction;
// the items recolour so the count can be read off.
function buildFractionOfQuantity(cfg, instruction, onSolved) {
  cfg = cfg || {};
  const totals = cfg.totals || [6, 12, 18, 24];
  const fractions = cfg.fractions || ['1/2', '1/3', '1/4', '2/3', '3/4', '5/6'];
  let total = cfg.initial_total || 12;
  let fr = cfg.initial_fraction || '1/3';
  let solved = false;
  const wrap = document.createElement('div');
  wrap.className = 'applet';
  const totChips = totals.map(t => `<button class="applet-btn" data-tot="${t}">${t}</button>`).join('');
  const frChips = fractions.map(f => `<button class="applet-btn" data-fr="${f}">${f}</button>`).join('');
  wrap.innerHTML = `
    <div class="applet-label">Interactive · fraction-of-quantity</div>
    ${instruction ? `<div class="applet-prompt">${instruction}</div>` : ''}
    <div class="applet-controls"><span>Total:</span>${totChips}</div>
    <div class="applet-controls"><span>Fraction:</span>${frChips}</div>
    <div class="applet-svg-host" data-role="items"></div>
    <div class="applet-prompt" data-role="check-head"></div>
    <div class="applet-controls">
      <span>Your answer:</span>
      <input type="number" min="0" inputmode="numeric" style="width:64px;text-align:center" data-role="in" placeholder="?">
      <button class="applet-btn" data-role="check">Check</button>
    </div>
    <div class="applet-feedback" data-role="feedback"></div>
    <div class="applet-result" data-role="result"></div>
  `;
  const host = wrap.querySelector('[data-role="items"]');
  const checkHead = wrap.querySelector('[data-role="check-head"]');
  const inEl = wrap.querySelector('[data-role="in"]');
  const feedback = wrap.querySelector('[data-role="feedback"]');
  const result = wrap.querySelector('[data-role="result"]');
  const checkBtn = wrap.querySelector('[data-role="check"]');
  const totBtns = Array.from(wrap.querySelectorAll('[data-tot]'));
  const frBtns = Array.from(wrap.querySelectorAll('[data-fr]'));
  function draw() {
    totBtns.forEach(b => b.classList.toggle('active', +b.dataset.tot === total));
    frBtns.forEach(b => b.classList.toggle('active', b.dataset.fr === fr));
    const [a, b] = fr.split('/').map(Number);
    const exact = total * a / b;
    const shaded = Math.max(0, Math.min(total, Math.round(exact)));
    const perRow = Math.min(total, 12), rad = 12, gap = 30;
    const rows = Math.ceil(total / perRow);
    const W = perRow * gap + 20, H = rows * gap + 20;
    let circ = '';
    for (let i = 0; i < total; i++) {
      const cx = 16 + (i % perRow) * gap, cy = 16 + Math.floor(i / perRow) * gap;
      const on = i < shaded;
      circ += `<circle cx="${cx}" cy="${cy}" r="${rad}" fill="${on ? PURPLE_FILL : PANEL_WHITE}" stroke="${on ? PURPLE_OUTLINE : '#999'}" stroke-width="2"/>`;
    }
    host.innerHTML = `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" style="max-width:100%;height:auto">${circ}</svg>`;
    checkHead.innerHTML = `Predict the count: \\(\\dfrac{${a}}{${b}}\\) of ${total} = ?`;
    if (window.renderMathInElement) renderMathInElement(checkHead, { delimiters: [{ left: '\\(', right: '\\)', display: false }], throwOnError: false });
    feedback.className = 'applet-feedback';
    feedback.textContent = '';
    result.innerHTML = '';
    inEl.value = '';
  }
  function check() {
    const [a, b] = fr.split('/').map(Number);
    const exact = total * a / b;
    const v = Number(inEl.value);
    if (!Number.isInteger(v)) {
      feedback.className = 'applet-feedback bad';
      feedback.textContent = 'Enter a whole number.';
      return;
    }
    if (!Number.isInteger(exact)) {
      feedback.className = 'applet-feedback bad';
      feedback.textContent = `${a}/${b} of ${total} doesn't split evenly into ${b} parts — pick a total divisible by ${b} and try again.`;
      return;
    }
    if (v === exact) {
      feedback.className = 'applet-feedback good';
      feedback.textContent = `✓ Correct — ${exact} of the ${total} items.`;
      result.innerHTML = `\\(\\dfrac{${a}}{${b}}\\) of ${total} = <strong>${exact}</strong>`;
      if (window.renderMathInElement) renderMathInElement(result, { delimiters: [{ left: '\\(', right: '\\)', display: false }], throwOnError: false });
      SoundEngine.playCorrect();
      if (!solved && typeof onSolved === 'function') { solved = true; onSolved(); }
    } else {
      feedback.className = 'applet-feedback bad';
      feedback.textContent = 'Not quite — count the shaded items.';
      SoundEngine.playIncorrect();
    }
  }
  totBtns.forEach(b => b.addEventListener('click', () => { total = +b.dataset.tot; draw(); }));
  frBtns.forEach(b => b.addEventListener('click', () => { fr = b.dataset.fr; draw(); }));
  checkBtn.addEventListener('click', check);
  draw();
  return wrap;
}

// Step 8 (L1.2) — divide by a fraction = "how many sub-units fit?".
// Multi-round; each round shows `total` unit boxes split into sub-cups.
function buildFractionDividerCount(cfg, instruction, onSolved) {
  cfg = cfg || {};
  const rounds = cfg.rounds || [];
  let idx = 0;
  const answered = new Array(rounds.length).fill(false);
  let solved = false;
  const wrap = document.createElement('div');
  wrap.className = 'applet';
  wrap.innerHTML = `
    <div class="applet-label">Interactive · fraction-divider-count</div>
    <div class="applet-round-badge" data-role="badge"></div>
    ${instruction ? `<div class="applet-prompt" data-role="prompt"></div>` : ''}
    <div class="applet-svg-host" data-role="beaker"></div>
    <div class="applet-prompt" data-role="check-head"></div>
    <div class="applet-controls">
      <span>Your answer:</span>
      <input type="number" min="0" inputmode="numeric" style="width:64px;text-align:center" data-role="in" placeholder="?">
      <button class="applet-btn" data-role="check">Check</button>
      <button class="applet-btn" data-role="next" style="margin-left:auto" disabled>Next round →</button>
    </div>
    <div class="applet-feedback" data-role="feedback"></div>
    <div class="applet-result" data-role="result"></div>
  `;
  const badge = wrap.querySelector('[data-role="badge"]');
  const promptEl = wrap.querySelector('[data-role="prompt"]');
  const beaker = wrap.querySelector('[data-role="beaker"]');
  const checkHead = wrap.querySelector('[data-role="check-head"]');
  const inEl = wrap.querySelector('[data-role="in"]');
  const feedback = wrap.querySelector('[data-role="feedback"]');
  const result = wrap.querySelector('[data-role="result"]');
  const checkBtn = wrap.querySelector('[data-role="check"]');
  const nextBtn = wrap.querySelector('[data-role="next"]');
  function renderRound() {
    const r = rounds[idx]; if (!r) return;
    const [dn, dd] = String(r.divisor).split('/').map(Number);
    const subPerUnit = dd / dn;
    badge.textContent = `Round ${idx + 1} of ${rounds.length}`;
    if (promptEl) promptEl.textContent = instruction;
    const unitW = 70, H = 70, x0 = 10, y0 = 10;
    const W = x0 * 2 + r.total * unitW;
    let svg = '', n = 0;
    for (let u = 0; u < r.total; u++) {
      const ux = x0 + u * unitW;
      const sw = unitW / subPerUnit;
      for (let s = 0; s < subPerUnit; s++) {
        const col = (n % 2 === 0) ? BLUE_FILL : '#CDEBFA';
        svg += `<rect x="${(ux + s * sw).toFixed(1)}" y="${y0}" width="${sw.toFixed(1)}" height="${H}" fill="${col}" stroke="${BLUE_OUTLINE}" stroke-width="1"/>`;
        n++;
      }
      svg += `<rect x="${ux}" y="${y0}" width="${unitW}" height="${H}" fill="none" stroke="${PURPLE_OUTLINE}" stroke-width="2.5"/>`;
    }
    beaker.innerHTML = `<svg viewBox="0 0 ${W} ${H + 20}" width="${W}" height="${H + 20}" style="max-width:100%;height:auto">${svg}</svg>`;
    checkHead.innerHTML = `Predict the count: ${r.total} ÷ \\(\\dfrac{${dn}}{${dd}}\\) = ?`;
    if (window.renderMathInElement) renderMathInElement(checkHead, { delimiters: [{ left: '\\(', right: '\\)', display: false }], throwOnError: false });
    inEl.value = '';
    feedback.className = 'applet-feedback';
    feedback.textContent = '';
    result.innerHTML = '';
    checkBtn.disabled = false;
    nextBtn.disabled = !answered[idx];
    nextBtn.textContent = idx < rounds.length - 1 ? 'Next round →' : 'Restart';
  }
  function check() {
    const r = rounds[idx];
    const [dn, dd] = String(r.divisor).split('/').map(Number);
    const subPerUnit = dd / dn;
    const target = r.count != null ? r.count : Math.round(r.total * subPerUnit);
    const v = Number(inEl.value);
    if (!Number.isInteger(v)) {
      feedback.className = 'applet-feedback bad';
      feedback.textContent = 'Enter a whole number.';
      return;
    }
    if (v === target) {
      feedback.className = 'applet-feedback good';
      feedback.textContent = `✓ Correct — ${target} sub-cups fit.`;
      result.innerHTML = `${r.total} ÷ \\(\\dfrac{${dn}}{${dd}}\\) = <strong>${target}</strong>`;
      if (window.renderMathInElement) renderMathInElement(result, { delimiters: [{ left: '\\(', right: '\\)', display: false }], throwOnError: false });
      SoundEngine.playCorrect();
      answered[idx] = true;
      checkBtn.disabled = true;
      nextBtn.disabled = false;
      if (answered.every(x => x === true) && !solved && typeof onSolved === 'function') {
        solved = true;
        onSolved();
      } else if (idx < rounds.length - 1) {
        setTimeout(() => { if (idx < rounds.length - 1) { idx += 1; renderRound(); } }, 1100);
      }
    } else {
      feedback.className = 'applet-feedback bad';
      feedback.textContent = 'Not quite — count the sub-cup segments inside the bar.';
      SoundEngine.playIncorrect();
    }
  }
  checkBtn.addEventListener('click', check);
  nextBtn.addEventListener('click', () => {
    if (idx < rounds.length - 1) { idx += 1; renderRound(); }
    else { idx = 0; renderRound(); }
  });
  renderRound();
  return wrap;
}

  const result = wrap.querySelector('[data-role="result"]');
  const checkBtn = wrap.querySelector('[data-role="check"]');
  const progressEl = wrap.querySelector('[data-role="progress"]');
  const fillBtnsEls = Array.from(wrap.querySelectorAll('[data-fill]'));
  const pourBtnsEls = Array.from(wrap.querySelectorAll('[data-pour]'));
  if (instruction && promptEl) promptEl.textContent = instruction;

  function parseFrac(s) { const [n, d] = String(s).split('/').map(Number); return [n, d]; }
  function gcd(a, b) { return b ? gcd(b, a % b) : a; }
  function simplify(n, d) { const g = gcd(Math.abs(n), Math.abs(d)) || 1; return [n / g, d / g]; }
  function eq(n1, d1, n2, d2) { return n1 * d2 === n2 * d1; }

  function compute() {
    const [fn, fd] = parseFrac(fill);
    const [pn, pd] = parseFrac(pour);
    // total = fd * pd guarantees integer slice counts for any proper fraction pair
    const total = fd * pd;
    const water = fn * pd;        // total * fn/fd
    const pourCount = fn * pn;    // water * pn/pd
    const remaining = water - pourCount;
    return { total, water, pourCount, remaining, fn, fd, pn, pd };
  }

  function draw() {
    fillBtnsEls.forEach(b => b.classList.toggle('active', b.dataset.fill === fill));
    pourBtnsEls.forEach(b => b.classList.toggle('active', b.dataset.pour === pour));

    const c = compute();
    const total = c.total;

    // Render bottle SVG
    const w = 80;
    const hSlice = Math.max(13, Math.min(32, 240 / total));
    const padTop = 18, padBot = 12;
    const H = padTop + total * hSlice + padBot;
    let body = '';
    body += `<rect x="${w/2 - 12}" y="${padTop - 12}" width="24" height="10" fill="#FFFFFF" stroke="#0A80D5" stroke-width="2" rx="2"/>`;
    body += `<rect x="0" y="${padTop}" width="${w}" height="${total * hSlice}" fill="#FFFFFF" stroke="#0A80D5" stroke-width="2" rx="4"/>`;
    for (let i = 0; i < total; i++) {
      const y = padTop + (total - 1 - i) * hSlice;
      let f = '#FFFFFF';
      if (i < c.remaining) f = '#8DD5F1';
      else if (i < c.remaining + c.pourCount) f = '#FEEFA0';
      body += `<rect x="0" y="${y}" width="${w}" height="${hSlice}" fill="${f}" stroke="#0A80D5" stroke-width="1"/>`;
    }
    bottleHost.innerHTML = `
      <svg viewBox="0 0 ${w} ${H}" width="${w + 6}" height="${H + 4}" style="display:block">${body}</svg>
      <div style="display:flex;flex-direction:column;gap:3px;justify-content:center;font-size:11px;color:#666;margin-top:6px;text-align:center">
        <span><span style="display:inline-block;width:10px;height:10px;background:#8DD5F1;border:1px solid #0A80D5;vertical-align:middle;margin-right:3px"></span>water left</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#FEEFA0;border:1px solid #0A80D5;vertical-align:middle;margin-right:3px"></span>poured</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#FFFFFF;border:1px solid #0A80D5;vertical-align:middle;margin-right:3px"></span>empty</span>
      </div>
    `;

    countsEl.innerHTML = `
      <div><strong>Total slices:</strong> ${total} <span style="color:#999">(= ${c.fd} × ${c.pd})</span></div>
      <div><strong>Water before pour:</strong> ${c.water} slices <span style="color:#999">(= ${c.fn}/${c.fd} of ${total})</span></div>
      <div><strong>Poured out:</strong> ${c.pourCount} slices <span style="color:#999">(= ${c.pn}/${c.pd} of ${c.water})</span></div>
      <div style="color:#0A80D5;font-weight:600">Water left: ${c.remaining} of ${total} slices</div>
    `;

    checkHead.innerHTML = `Type the remaining water as a fraction of the bottle:`;
    feedback.className = 'applet-feedback';
    feedback.textContent = '';
    result.innerHTML = '';
    numIn.value = '';
    denIn.value = '';
    progressEl.textContent = solved
      ? `✓ Solved — ${correctSet.size} of ${required} distinct combinations correct.`
      : `Correct combinations: ${correctSet.size} of ${required}. Try a different fill or pour after each correct answer.`;
  }

  function check() {
    const c = compute();
    const n = Number(numIn.value);
    const d = Number(denIn.value);
    if (!Number.isInteger(n) || !Number.isInteger(d) || d <= 0) {
      feedback.className = 'applet-feedback bad';
      feedback.textContent = 'Enter whole numbers in both boxes.';
      return;
    }
    if (eq(n, d, c.remaining, c.total)) {
      feedback.className = 'applet-feedback good';
      const [sN, sD] = simplify(c.remaining, c.total);
      feedback.textContent = `✓ Correct — ${c.remaining} of ${c.total} slices.`;
      result.innerHTML = `Remaining water = \\(\\dfrac{${c.remaining}}{${c.total}}\\) = \\(\\dfrac{${sN}}{${sD}}\\) of the bottle.`;
      if (window.renderMathInElement) renderMathInElement(result, { delimiters: [{ left: '\\(', right: '\\)', display: false }], throwOnError: false });
      SoundEngine.playCorrect();
      correctSet.add(`${fill}|${pour}`);
      if (!solved && correctSet.size >= required) {
        solved = true;
        if (typeof onSolved === 'function') onSolved();
      }
      progressEl.textContent = solved
        ? `✓ Solved — ${correctSet.size} of ${required} distinct combinations correct.`
        : `Correct combinations: ${correctSet.size} of ${required}. Pick a different fill or pour to continue.`;
    } else {
      feedback.className = 'applet-feedback bad';
      feedback.textContent = `Not quite. Count the BLUE slices (water still left) and put that over ${c.total}.`;
      SoundEngine.playIncorrect();
    }
  }

  fillBtnsEls.forEach(b => b.addEventListener('click', () => { fill = b.dataset.fill; draw(); }));
  pourBtnsEls.forEach(b => b.addEventListener('click', () => { pour = b.dataset.pour; draw(); }));
  checkBtn.addEventListener('click', check);
  draw();
  return wrap;
}

// ─── Applet: decimal-fraction-converter (L1.3 Pass 1 — visual card-matching) ───
function buildDecimalFractionConverter(cfg, instruction, onSolved) {
  cfg = cfg || {};
  const rounds = cfg.rounds || [
    { decimal: '0.25', fraction: '1/4' },
    { decimal: '0.7',  fraction: '7/10' },
    { decimal: '0.125', fraction: '1/8' }
  ];
  const n = rounds.length;
  const decimals = rounds.map(r => r.decimal);
  const fractions = rounds.map(r => r.fraction);
  // Scramble fraction display order for non-leak (canonical scramble for n=3)
  const fractionOrder = (n === 3) ? [2, 0, 1] : [...Array(n).keys()];
  let selectedDecimalIdx = null;  // decimal originally indexed (matches rounds)
  const pairs = new Map();        // decimalIdx -> fractionOrigIdx
  let solved = false;

  const wrap = document.createElement('div');
  wrap.className = 'applet';
  // Helper: render fraction as KaTeX stacked frac
  const toKatexFrac = (fracStr) => {
    const parts = String(fracStr).split('/');
    return (parts.length === 2)
      ? `\\(\\dfrac{${parts[0]}}{${parts[1]}}\\)`
      : fracStr;
  };
  const decimalCardsHtml = decimals.map((d, i) =>
    `<div class="dfc-card" data-role="dec" data-d-idx="${i}"
      style="display:flex;width:104px;height:64px;border:2px solid #850F85;background:#EBBDEC;border-radius:10px;align-items:center;justify-content:center;cursor:pointer;font-size:1.4em;font-weight:600;margin:8px 0;user-select:none;transition:opacity .2s,outline .15s;">${d}</div>`
  ).join('');
  const fractionCardsHtml = fractionOrder.map((origIdx) =>
    `<div class="dfc-card" data-role="frac" data-f-orig-idx="${origIdx}"
      style="display:flex;width:104px;height:64px;border:2px solid #0A80D5;background:#FFFFFF;border-radius:10px;align-items:center;justify-content:center;cursor:pointer;font-size:1.3em;font-weight:600;margin:8px 0;user-select:none;transition:opacity .2s,outline .15s;">${toKatexFrac(fractions[origIdx])}</div>`
  ).join('');
  wrap.innerHTML = `
    <div class="applet-label">Interactive · decimal-fraction-converter</div>
    ${instruction ? `<div class="applet-prompt">${instruction}</div>` : ''}
    <div class="applet-prompt" data-role="status" style="font-size:0.95em;color:#666;"></div>
    <div style="display:flex;justify-content:center;gap:120px;margin:14px 0 8px;align-items:flex-start;">
      <div>
        <div style="font-size:0.8em;color:#666;text-align:center;margin-bottom:4px;font-weight:600;letter-spacing:.04em;">DECIMALS</div>
        ${decimalCardsHtml}
      </div>
      <div>
        <div style="font-size:0.8em;color:#666;text-align:center;margin-bottom:4px;font-weight:600;letter-spacing:.04em;">FRACTIONS</div>
        ${fractionCardsHtml}
      </div>
    </div>
    <div class="applet-feedback" data-role="feedback"></div>
    <div class="applet-controls" style="margin-top:8px;justify-content:center;gap:12px;">
      <button class="applet-btn" data-role="check">Check matches</button>
      <button class="applet-btn" data-role="reset" style="background:#FFFFFF;border:1px solid #CCC;color:#333;">Reset</button>
    </div>
  `;
  const status = wrap.querySelector('[data-role="status"]');
  const feedback = wrap.querySelector('[data-role="feedback"]');
  const checkBtn = wrap.querySelector('[data-role="check"]');
  const resetBtn = wrap.querySelector('[data-role="reset"]');
  const decCards = Array.from(wrap.querySelectorAll('[data-role="dec"]'));
  const fracCards = Array.from(wrap.querySelectorAll('[data-role="frac"]'));

  // Render KaTeX fractions in the cards
  if (window.renderMathInElement) {
    renderMathInElement(wrap, { delimiters: [{ left: '\\(', right: '\\)', display: false }], throwOnError: false });
  }

  function updateUI() {
    const pairedFracs = new Set(pairs.values());
    decCards.forEach(card => {
      const i = +card.dataset.dIdx;
      const paired = pairs.has(i);
      card.style.opacity = paired ? '0.5' : '1';
      card.style.outline = (selectedDecimalIdx === i) ? '3px solid #149A55' : 'none';
      card.style.outlineOffset = '2px';
    });
    fracCards.forEach(card => {
      const origIdx = +card.dataset.fOrigIdx;
      card.style.opacity = pairedFracs.has(origIdx) ? '0.5' : '1';
    });
    if (pairs.size === 0) {
      status.textContent = selectedDecimalIdx !== null
        ? `Selected ${decimals[selectedDecimalIdx]} — now click its fraction partner.`
        : 'Click a decimal card, then click its fraction partner.';
    } else {
      status.textContent = `${pairs.size} of ${n} pairs matched.`;
    }
  }
  decCards.forEach(card => {
    card.addEventListener('click', () => {
      const i = +card.dataset.dIdx;
      if (pairs.has(i)) return;
      selectedDecimalIdx = (selectedDecimalIdx === i) ? null : i;
      feedback.className = 'applet-feedback';
      feedback.textContent = '';
      updateUI();
    });
  });
  fracCards.forEach(card => {
    card.addEventListener('click', () => {
      const origIdx = +card.dataset.fOrigIdx;
      if (new Set(pairs.values()).has(origIdx)) return;
      if (selectedDecimalIdx === null) {
        feedback.className = 'applet-feedback bad';
        feedback.textContent = 'Pick a decimal first, then click its fraction.';
        return;
      }
      pairs.set(selectedDecimalIdx, origIdx);
      selectedDecimalIdx = null;
      feedback.className = 'applet-feedback';
      feedback.textContent = '';
      updateUI();
    });
  });
  checkBtn.addEventListener('click', () => {
    if (pairs.size < n) {
      feedback.className = 'applet-feedback bad';
      feedback.textContent = `Match all ${n} pairs first.`;
      return;
    }
    const wrongs = [];
    for (const [dIdx, fOrigIdx] of pairs.entries()) {
      if (dIdx !== fOrigIdx) wrongs.push(`${decimals[dIdx]} → ${fractions[fOrigIdx]}`);
    }
    if (wrongs.length === 0) {
      feedback.className = 'applet-feedback good';
      feedback.innerHTML = `✓ All ${n} pairs correct. <strong>${decimals.map((d,i)=>`${d} = ${toKatexFrac(fractions[i])}`).join(' · ')}</strong>`;
      if (window.renderMathInElement) renderMathInElement(feedback, { delimiters: [{ left: '\\(', right: '\\)', display: false }], throwOnError: false });
      if (typeof SoundEngine !== 'undefined') SoundEngine.playCorrect();
      if (!solved && typeof onSolved === 'function') { solved = true; onSolved(); }
    } else {
      feedback.className = 'applet-feedback bad';
      feedback.textContent = `These pairs aren't right: ${wrongs.join(', ')}. Try again.`;
      if (typeof SoundEngine !== 'undefined') SoundEngine.playIncorrect();
    }
  });
  resetBtn.addEventListener('click', () => {
    pairs.clear();
    selectedDecimalIdx = null;
    feedback.className = 'applet-feedback';
    feedback.textContent = '';
    updateUI();
  });
  updateUI();
  return wrap;
}

// ─── Applet: decimal-place-value-builder (L1.3 Pass 2) ────────────
function buildDecimalPlaceValueBuilder(cfg, instruction, onSolved) {

    }
    const r = rounds[roundIdx];

    const tgtStr = String(r.target);
    const tgtParts = tgtStr.split('/');

    if (window.renderMathInElement) {

    const onesHtml = `

          <span style="display:inline-block;width:13px;height:13px;border-radius:50%;background:#149A55;"></span>
        </span>
        <span style="font-size:0.78em;color:transparent;margin-top:6px;">.</span>
      </span>`;
    const placesHtml = r.places.map((place, i) => `
      <span style="display:inline-flex;flex-direction:column;align-items:center;margin:0 4px;vertical-align:top;">
        <input class="fib-input" type="number" min="0" max="9" inputmode="numeric" data-role="d${i}" placeholder="?" style="width:56px;height:56px;text-align:center;font-size:1.7em;font-weight:700;border:2px solid #0A80D5;border-radius:8px;padding:0;box-sizing:border-box;">
        <span style="font-size:0.78em;color:#666;margin-top:6px;">${place}</span>
      </span>`).join('');
    columns.innerHTML = onesHtml + dpHtml + placesHtml;
    feedback.className = 'applet-feedback';
    feedback.textContent = '';
  }
  function check() {
    if (roundIdx >= rounds.length) return;
    const r = rounds[roundIdx];
    const userDigits = r.digits.map((_, i) => {
      const inp = wrap.querySelector(`[data-role="d${i}"]`);
      return inp ? Number(inp.value) : NaN;
    });
    if (userDigits.some(d => !Number.isInteger(d) || d < 0 || d > 9)) {
      feedback.className = 'applet-feedback bad';
      feedback.textContent = 'Enter a digit (0–9) in each column.';

      feedback.className = 'applet-feedback bad';
      feedback.textContent = `Not quite — check each digit's place.`;
      if (typeof SoundEngine !== 'undefined') SoundEngine.playIncorrect();
    }
  }
  checkBtn.addEventListener('click', check);
  renderState();
  return wrap;
}

function buildDecimalShiftVisualizer(cfg, instruction, onSolved) {

  const rounds = cfg.rounds || [
    { start: '5.7',  op: '× 10',  expected: '57' },

      return;
    }
    const r = rounds[roundIdx];
    roundBadge.textContent = `Round ${roundIdx + 1} of ${rounds.length}`;

    input.value = '';

  }
  checkBtn.addEventListener('click', check);
  renderState();
  return wrap;
}

  const shadedVal = wrap.querySelector('[data-role="shaded-val"]');

      const lo = b * 100;
      // shaded count within this bar (0..100)
      const inThisBar = Math.max(0, Math.min(100, shaded - lo));
      const fill = b === 0 ? GREEN_FILL : BLUE_FILL;
      const outline = b === 0 ? GREEN_OUTLINE : BLUE_OUTLINE;
      const width = 500, height = 36;
      const pieceW = width / 100;
      let pieces = '';
      for (let i = 0; i < 100; i++) {
        const f = i < inThisBar ? fill : PANEL_WHITE;
        pieces += `<rect data-seg="${lo + i + 1}" x="${(i * pieceW).toFixed(2)}" y="0" width="${pieceW.toFixed(2)}" height="${height}" fill="${f}" stroke="${outline}" stroke-width="0.6" style="cursor:pointer"/>`;
      }
      html += `<svg viewBox="0 0 ${width} ${height}" width="${width}" height="${height}" style="max-width:100%;height:auto" data-role="bar-svg">${pieces}</svg>`;
    }
    barsHost.innerHTML = html;
    barsHost.querySelectorAll('rect[data-seg]').forEach(rc => {
      rc.addEventListener('click', () => {
        const seg = +rc.dataset.seg;
        // clicking the currently-last shaded segment unshades it; else set to seg
        shaded = (shaded === seg) ? seg - 1 : seg;
        afterShadeChange();
      });
    });
  }
  function afterShadeChange() {
    shaded = Math.max(0, Math.min(maxSegments(), shaded));
    shadedVal.textContent = shaded;
    feedback.className = 'applet-feedback';
    feedback.textContent = '';
    renderBars();
  }
  function adjust(delta) {
    shaded = Math.max(0, Math.min(maxSegments(), shaded + delta));
    afterShadeChange();
  }
  function toKatexFrac(fracStr) {
    const parts = String(fracStr).split('/');
    return (parts.length === 2) ? `\\(\\dfrac{${parts[0]}}{${parts[1]}}\\)` : fracStr;
  }
  function renderRound() {
    const r = rounds[roundIdx];
    if (!r) return;
    shaded = 0;
    badge.textContent = (cfg.round_badge || 'Round N of 3').replace('N', String(roundIdx + 1)).replace(/of\s+\d+/, `of ${rounds.length}`);
    prompt.innerHTML = `Shade the bar to show <strong>${r.target_label}</strong>.`;
    shadedVal.textContent = shaded;
    feedback.className = 'applet-feedback';
    feedback.textContent = '';
    result.innerHTML = '';
    checkBtn.disabled = false;
    decBtn.disabled = false; incBtn.disabled = false;
    renderBars();
  }
  function check() {
    const r = rounds[roundIdx];
    if (!r) return;
    if (shaded === r.segments) {
      const rb = r.readback || {};
      feedback.className = 'applet-feedback good';
      feedback.innerHTML = `✓ ${r.segments} of 100 shaded.`;
      result.innerHTML = `<strong>${r.segments} of 100 = ${rb.percent || r.target_label} = ${toKatexFrac(rb.fraction)} = ${rb.decimal}</strong>`;
      if (window.renderMathInElement) renderMathInElement(result, { delimiters: [{ left: '\\(', right: '\\)', display: false }], throwOnError: false });
      if (typeof SoundEngine !== 'undefined') SoundEngine.playCorrect();
      checkBtn.disabled = true; decBtn.disabled = true; incBtn.disabled = true;
      if (roundIdx < rounds.length - 1) {
        setTimeout(() => { roundIdx += 1; renderRound(); }, 1600);
      } else if (!solved && typeof onSolved === 'function') {
        solved = true; onSolved();
      }
    } else {
      feedback.className = 'applet-feedback bad';
      feedback.textContent = shaded < r.segments
        ? `Not enough — you have ${shaded} of 100 shaded, keep going to ${r.target_label}.`
        : `Too much — you have ${shaded} of 100 shaded, that's past ${r.target_label}.`;
      if (typeof SoundEngine !== 'undefined') SoundEngine.playIncorrect();
    }
  }
  decBtn.addEventListener('click', () => adjust(-1));
  incBtn.addEventListener('click', () => adjust(1));
  checkBtn.addEventListener('click', check);
  renderRound();
  return wrap;
}

// ─── Applet: survival-fraction-tracker (L1.4 IL14) ────────────────
function buildSurvivalFractionTracker(cfg, instruction, onSolved) {
  cfg = cfg || {};
  const rounds = cfg.rounds || [];
  let roundIdx = 0;
  let solved = false;
  const wrap = document.createElement('div');
  wrap.className = 'applet';
  wrap.innerHTML = `
    <div class="applet-label">Interactive · survival-fraction-tracker</div>
    ${instruction ? `<div class="applet-prompt">${instruction}</div>` : ''}
    <div class="applet-round-badge" data-role="round-badge"></div>
    <div class="applet-prompt" data-role="prompt"></div>
    <div data-role="stages" style="display:flex;flex-wrap:wrap;gap:14px;margin:10px 0;align-items:flex-end;"></div>
    <div class="applet-controls">
      <button class="applet-btn" data-role="check-stages">Check survival rates</button>
    </div>
    <div data-role="final" style="margin-top:10px;display:none;"></div>
    <div class="applet-feedback" data-role="feedback"></div>
    <div class="applet-result" data-role="result"></div>
  `;
  const badge = wrap.querySelector('[data-role="round-badge"]');
  const prompt = wrap.querySelector('[data-role="prompt"]');
  const stagesHost = wrap.querySelector('[data-role="stages"]');
  const checkStagesBtn = wrap.querySelector('[data-role="check-stages"]');
  const finalHost = wrap.querySelector('[data-role="final"]');
  const feedback = wrap.querySelector('[data-role="feedback"]');
  const result = wrap.querySelector('[data-role="result"]');
  const approx = (a, b) => Math.abs(a - b) < 1e-6;
  function fmtProduct(p) {
    // trim trailing zeros, keep readable (0.4, 0.99, 0.21)
    return String(parseFloat(p.toFixed(6)));
  }
  function renderRound() {
    const r = rounds[roundIdx];
    if (!r) return;
    badge.textContent = (cfg.round_badge || 'Round N of 3').replace('N', String(roundIdx + 1)).replace(/of\s+\d+/, `of ${rounds.length}`);
    prompt.innerHTML = `Enter the survival rate left after each change. The running product builds as you go.`;
    const cards = r.stages.map((st, i) => `
      <span style="display:inline-flex;flex-direction:column;align-items:center;gap:6px;">
        <span style="font-weight:700;font-size:1.15em;color:var(--good)">${st.change_label}</span>
        <input class="fib-input" type="text" inputmode="decimal" data-role="sr${i}" placeholder="?" style="width:72px;text-align:center;font-size:1.2em;">
        <span style="font-size:0.78em;color:var(--muted)">survives</span>
        <span data-role="rp${i}" style="font-size:0.85em;color:var(--muted);min-height:1.1em;"></span>
      </span>
      ${i < r.stages.length - 1 ? '<span style="font-size:1.3em;align-self:center;color:var(--muted)">×</span>' : ''}
    `).join('');
    stagesHost.innerHTML = cards;
    checkStagesBtn.disabled = false;
    finalHost.style.display = 'none';
    finalHost.innerHTML = '';
    feedback.className = 'applet-feedback';
    feedback.textContent = '';
    result.innerHTML = '';
  }
  function checkStages() {
    const r = rounds[roundIdx];
    if (!r) return;
    const vals = r.stages.map((_, i) => {
      const inp = wrap.querySelector(`[data-role="sr${i}"]`);
      return inp ? Number(String(inp.value).trim()) : NaN;
    });
    if (vals.some(v => !Number.isFinite(v))) {
      feedback.className = 'applet-feedback bad';
      feedback.textContent = 'Enter a survival rate (a decimal like 0.8) for each change.';
      return;
    }
    const firstWrong = r.stages.findIndex((st, i) => !approx(vals[i], st.survival_rate));
    if (firstWrong !== -1) {
      const st = r.stages[firstWrong];
      feedback.className = 'applet-feedback bad';
      feedback.textContent = st.direction === 'up'
        ? `Check the ${st.change_label} stage — a rise means more than 100% survives.`
        : `Check the ${st.change_label} stage — if ${st.percent}% is lost, what fraction is left?`;
      if (typeof SoundEngine !== 'undefined') SoundEngine.playIncorrect();
      return;
    }
    // all stage rates correct — show running products
    r.stages.forEach((st, i) => {
      const rp = wrap.querySelector(`[data-role="rp${i}"]`);
      if (rp) rp.textContent = `running: ${fmtProduct(r.running_products[i])}`;
    });
    if (typeof SoundEngine !== 'undefined') SoundEngine.playCorrect();
    feedback.className = 'applet-feedback good';
    feedback.textContent = '✓ Survival rates correct — now finish the chain.';
    checkStagesBtn.disabled = true;
    showFinalQuestion();
  }
  function showFinalQuestion() {
    const r = rounds[roundIdx];
    finalHost.style.display = 'block';
    finalHost.innerHTML = `
      <div class="applet-prompt">After the last stage, <strong>${fmtProduct(r.final_product)}</strong> is left — what percent is that?</div>
      <div class="applet-controls">
        <input class="fib-input" type="text" inputmode="decimal" data-role="final-input" placeholder="?" style="width:100px;font-size:1.2em;">
        <button class="applet-btn" data-role="check-final">Check</button>
      </div>
    `;
    const finalInput = finalHost.querySelector('[data-role="final-input"]');
    const checkFinalBtn = finalHost.querySelector('[data-role="check-final"]');
    function checkFinal() {
      const raw = String(finalInput.value).trim().replace('%', '');
      const userN = Number(raw);
      const expN = Number(String(r.final_percent).replace('%', ''));
      if (!Number.isFinite(userN)) {
        feedback.className = 'applet-feedback bad';
        feedback.textContent = 'Enter the percent (for example, 40 or 40%).';
        return;
      }
      if (approx(userN, expN)) {
        feedback.className = 'applet-feedback good';
        feedback.innerHTML = `✓ ${fmtProduct(r.final_product)} of the original = ${r.final_percent}.`;
        result.innerHTML = `<strong>${r.stages.map(s => s.survival_rate).join(' × ')} = ${fmtProduct(r.final_product)} = ${r.final_percent}</strong>`;
        if (typeof SoundEngine !== 'undefined') SoundEngine.playCorrect();
        checkFinalBtn.disabled = true; finalInput.disabled = true;
        if (roundIdx < rounds.length - 1) {
          setTimeout(() => { roundIdx += 1; renderRound(); }, 1600);
        } else if (!solved && typeof onSolved === 'function') {
          solved = true; onSolved();
        }
      } else {
        feedback.className = 'applet-feedback bad';
        feedback.textContent = `Not quite — to turn ${fmtProduct(r.final_product)} into a percent, multiply by 100.`;
        if (typeof SoundEngine !== 'undefined') SoundEngine.playIncorrect();
      }
    }
    checkFinalBtn.addEventListener('click', checkFinal);
  }
  checkStagesBtn.addEventListener('click', checkStages);
  renderRound();
  return wrap;
}

function renderApplet(step, onSolved) {
  if (!step || step.type !== 'applet' || !step.applet_type) return null;
  const cfg = step.config || {};
  switch (step.applet_type) {
    case 'fraction-bar-builder': return buildFractionBarBuilder(cfg, step.instruction, onSolved);
    case 'equivalent-fraction-multiplier': return buildEquivalentMultiplier(cfg, step.instruction, onSolved);
    case 'equivalence-bar-builder': return buildEquivalenceBarBuilder(cfg, step.instruction, onSolved);
    case 'fraction-comparator': return buildFractionComparator(cfg, step.instruction, onSolved);
    case 'fraction-multiplier-grid': return buildFractionMultiplierGrid(cfg, step.instruction, onSolved);
    case 'fraction-of-quantity': return buildFractionOfQuantity(cfg, step.instruction, onSolved);
    case 'fraction-divider-count': return buildFractionDividerCount(cfg, step.instruction, onSolved);
    case 'bottle-pour': return buildBottlePour(cfg, step.instruction, onSolved);
    case 'decimal-fraction-converter': return buildDecimalFractionConverter(cfg, step.instruction, onSolved);
    case 'decimal-place-value-builder': return buildDecimalPlaceValueBuilder(cfg, step.instruction, onSolved);
    case 'decimal-shift-visualizer': return buildDecimalShiftVisualizer(cfg, step.instruction, onSolved);
    case 'percent-bar-builder': return buildPercentBarBuilder(cfg, step.instruction, onSolved);
    case 'survival-fraction-tracker': return buildSurvivalFractionTracker(cfg, step.instruction, onSolved);
    default: return null;
  }
}

function prettifyKey(k) {
  return String(k || '').replace(/_/g, ' ').replace(/^\w/, c => c.toUpperCase());
}

// ─── Top-level render ─────────────────────────────────────────────
function render() {
  renderSidebar();
  const content = $('#content');
  content.innerHTML = '';
  content.className = ''; // remove splash class
  const it = state.items[state.cursor];
  if (!it) {
    content.appendChild(el('div', { class: 'panel' }, el('div', { class: 'item-title' }, 'Lesson complete 🎉')));
    recalcProgress();
    return;
  }
  let node;
  if (it.kind === 'question') {
    const q = it.data;
    if (q.type === 'fill_in_blank' || q.type === 'cloze_drag') node = renderFIB(it);
    else node = renderMCQ(it);
  } else if (it.kind === 'mc-question') {
    const q = it.data;
    if (q.type === 'fill_in_blank' || q.type === 'cloze_drag') node = renderFIB(it);
    else node = renderMCQ(it);
  } else if (it.kind === 'worked-example') {
    node = renderWE(it);
  } else if (it.kind === 'il-step') {
    node = renderILStep(it);
  } else if (it.kind === 'key-insight') {
    node = renderKeyInsight(it);
  } else if (it.kind === 'mc-summary') {
    node = renderMCSummary(it);
  }
  if (node) {
    node.classList.add('is-fresh');
    content.appendChild(node);
  }

  // Bottom nav (Prev / Next)
  const nav = el('div', { class: 'bottom-nav' },
    el('button', { class: 'btn' + (state.cursor === 0 ? ' disabled' : ''), onclick: prevItem, disabled: state.cursor === 0 }, '← Previous'),
    el('span', { class: 'item-counter', style: 'margin:0' }, `Item ${state.cursor + 1} of ${state.items.length}`),
    el('button', { class: 'btn', onclick: nextItem, disabled: state.cursor >= state.items.length - 1 }, 'Next →'),
  );
  content.appendChild(nav);

  // Math render pass
  mathifyDom(content);
  // Numeric keypad: tag every fill-in-blank in the just-rendered content
  // so tapping a blank pops the keypad and tapping elsewhere dismisses it.
  Keypad.attach(content);
  recalcProgress();
  // Sync URL hash to position
  history.replaceState(null, '', `?lesson=${SLUG}#${state.cursor}`);

  // ─── Auto-advance: schedule once per (cursor, status) transition ───
  // Only for MCQ/FIB items (question / mc-question kinds). IL steps,
  // worked examples, key insights, and the MC summary advance manually.
  maybeScheduleAutoAdvance(it);
}

function maybeScheduleAutoAdvance(it) {
  if (!it) return;
  if (state.cursor >= state.items.length - 1) return;  // last item — let user finish
  const st = getSt(it.id);
  if (!st) return;

  let ms = 0;
  if (it.kind === 'question' || it.kind === 'mc-question') {
    // MCQ / FIB items.
    ms =
      st.status === 'correct' ? ADVANCE_CORRECT_MS :
      st.status === 'wrong-shown' ? ADVANCE_WRONG_SHOWN_MS : 0;
  } else if (it.kind === 'il-step' && st.__ilReadyToAdvance) {
    // Interactive-lesson step whose questions are all answered correctly.
    ms = ADVANCE_IL_MS;
  }
  if (!ms) return;
  if (st.__advanceScheduledFor === state.cursor) return;  // already scheduled this turn
  st.__advanceScheduledFor = state.cursor;
  scheduleAutoAdvance(ms);
  // Add a visual progress bar under the feedback so the student sees what's coming.
  const fb = document.querySelector('.feedback.good, .answer-reveal, .applet-feedback.good, .applet .insight');
  if (fb) {
    const bar = document.createElement('div');
    bar.className = 'auto-advance-bar';
    bar.style.setProperty('--advance-ms', ms + 'ms');
    bar.innerHTML = '<span></span>';
    fb.parentNode.insertBefore(bar, fb.nextSibling);
  }
}

function nextItem() {
  if (FOCUS) return;   // single-item embed: no navigation
  cancelAutoAdvance();
  if (state.cursor < state.items.length - 1) {
    state.cursor += 1;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    render();
  }
}
function prevItem() {
  cancelAutoAdvance();
  if (state.cursor > 0) {
    state.cursor -= 1;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    render();
  }
}

// ─── Init ─────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(CFG.json);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    state.lesson = await res.json();
  } catch (e) {
    $('#content').innerHTML = '';
    $('#content').appendChild(el('div', { class: 'error' },
      'Could not load lesson JSON: ' + e.message + '. Serve via HTTP — file:// will not work.'));
    return;
  }
  state.items = buildItems(state.lesson);
  // Focus mode: show only ONE flattened item (IL step or any block item), no chrome.
  if (FOCUS) {
    if (FOCUS_STEP != null) {
      const idx = state.items.findIndex(x => x.kind === 'il-step' && x.id === 'S' + FOCUS_STEP);
      if (idx >= 0) state.cursor = idx;
    } else if (FOCUS_ITEM != null && FOCUS_ITEM >= 0 && FOCUS_ITEM < state.items.length) {
      state.cursor = FOCUS_ITEM;
    }
    document.body.classList.add('focus-step');
    const fs = document.createElement('style');
    fs.textContent =
      'body.focus-step header.app,body.focus-step aside.sidebar{display:none!important}' +
      // collapse the sidebar grid track so content uses the FULL iframe width
      'body.focus-step .shell{display:block!important;grid-template-columns:1fr!important;min-height:0!important}' +
      'body.focus-step main.player{width:100%!important;max-width:none!important;margin:0!important;padding:16px!important}' +
      'body.focus-step .panel{max-width:none!important}' +
      'body.focus-step .actions,body.focus-step .breadcrumb,body.focus-step .item-counter{display:none!important}' +
      'body.focus-step{background:#fff!important}';
    document.head.appendChild(fs);
  }
  // Read cursor from URL hash if present
  const hashIdx = parseInt(location.hash.replace('#', ''), 10);
  if (!FOCUS && Number.isFinite(hashIdx) && hashIdx >= 0 && hashIdx < state.items.length) {
    state.cursor = hashIdx;
  }
  $('#lesson-title').textContent = `Lesson ${state.lesson.lesson_number} — ${state.lesson.title}`;
  $('#lesson-sub').textContent = state.lesson.unit;
  const soundBtn = document.getElementById('sound-toggle');
  if (soundBtn) soundBtn.textContent = state.soundOn ? '🔊' : '🔇';
  render();
}
init();
</script>
