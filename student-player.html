<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Math Kangaroo G5–6 — Lesson Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<link rel="stylesheet" href="_vendor/katex/katex.min.css" />
<script defer src="_vendor/katex/katex.min.js"></script>
<script defer src="_vendor/katex/auto-render.min.js"></script>

<style>
  :root {
    --bg: #f5f7fb;
    --panel: #ffffff;
    --panel-soft: #f0f3fa;
    --border: #e3e7f0;
    --border-strong: #c9d0dc;
    --text: #1f2330;
    --muted: #707892;
    --accent: #5b6cff;
    --accent-soft: #e8ecff;
    --good: #16a47e;
    --good-soft: #d9f4e8;
    --bad: #d23f3f;
    --bad-soft: #fbe2e2;
    --warn: #d08a00;
    --pyq: #8a4dd9;
    --pyq-soft: #efe7fb;
    --shadow-sm: 0 1px 2px rgba(20, 25, 50, 0.06);
    --shadow-md: 0 4px 14px rgba(20, 25, 50, 0.08);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.55; font-size: 15px;
  }

  /* ── HEADER ────────────────────────────────────────────────── */
  header.app {
    position: sticky; top: 0; z-index: 20;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    padding: 12px 24px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 18px;
    align-items: center;
  }
  header.app .left, header.app .right {
    display: flex; align-items: center; gap: 14px;
    font-size: 13px; color: var(--muted);
  }
  header.app .left a {
    color: var(--accent); text-decoration: none; font-weight: 600;
  }
  header.app .left a:hover { text-decoration: underline; }
  header.app .center {
    text-align: center;
    font-weight: 600; font-size: 15px;
  }
  header.app .center .sub {
    display: block; font-size: 12px; color: var(--muted); font-weight: 500;
  }
  header.app .progress {
    display: flex; align-items: center; gap: 10px;
  }
  header.app .progress .bar {
    width: 140px; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden;
  }
  header.app .progress .bar .fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--good));
    transition: width 0.3s ease;
  }
  header.app .xp {
    background: var(--accent-soft); color: var(--accent);
    padding: 4px 10px; border-radius: 999px;
    font-weight: 600; font-size: 12px;
  }

  /* ── APP SHELL ─────────────────────────────────────────────── */
  .shell {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 60px);
  }
  @media (max-width: 880px) {
    .shell { grid-template-columns: 1fr; }
    aside.sidebar { display: none; }
  }

  /* ── SIDEBAR ───────────────────────────────────────────────── */
  aside.sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 18px 14px 30px;
    position: sticky; top: 60px; align-self: start;
    max-height: calc(100vh - 60px); overflow-y: auto;
  }
  aside.sidebar h3 {
    margin: 0 0 12px;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--muted); font-weight: 700;
  }
  aside.sidebar ol { list-style: none; padding: 0; margin: 0; }
  aside.sidebar .block-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px;
    cursor: pointer; font-size: 13px;
    color: var(--text);
    transition: background 0.15s;
  }
  aside.sidebar .block-item:hover { background: var(--panel-soft); }
  aside.sidebar .block-item.active {
    background: var(--accent-soft); color: var(--accent); font-weight: 600;
  }
  aside.sidebar .block-item.done .status { color: var(--good); }
  aside.sidebar .block-item .status {
    width: 18px; height: 18px;
    border-radius: 50%; border: 1.5px solid var(--border-strong);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--muted);
    background: var(--panel);
    flex: 0 0 18px;
  }
  aside.sidebar .block-item.done .status {
    background: var(--good); color: white; border-color: var(--good);
  }
  aside.sidebar .block-item.active .status {
    border-color: var(--accent); color: var(--accent);
  }
  aside.sidebar .block-item.done.active .status {
    background: var(--good); color: white;
  }
  aside.sidebar .block-item .title { flex: 1; }
  aside.sidebar .block-item .count {
    font-size: 11px; color: var(--muted); font-weight: 500;
  }

  /* ── MAIN ──────────────────────────────────────────────────── */
  main.player {
    padding: 24px 32px 80px;
    max-width: 880px; margin: 0 auto; width: 100%;
  }
  .breadcrumb {
    font-size: 12px; color: var(--muted);
    display: flex; gap: 8px; align-items: center; margin-bottom: 8px;
  }
  .breadcrumb .chip {
    background: var(--accent-soft); color: var(--accent);
    padding: 2px 10px; border-radius: 999px;
    font-weight: 600;
  }
  .breadcrumb .pyq-chip {
    background: var(--pyq-soft); color: var(--pyq);
    padding: 2px 10px; border-radius: 999px; font-weight: 600;
  }
  .breadcrumb .orig-chip {
    background: var(--good-soft); color: var(--good);
    padding: 2px 10px; border-radius: 999px; font-weight: 600;
  }
  .breadcrumb .diff-chip {
    background: var(--panel-soft); color: var(--text);
    padding: 2px 10px; border-radius: 999px; font-weight: 600;
    border: 1px solid var(--border);
  }
  .item-title {
    font-size: 22px; font-weight: 700; margin: 4px 0 2px;
  }
  .item-counter {
    font-size: 12px; color: var(--muted); margin: 0 0 14px;
  }

  .panel {
    background: var(--panel);
    border-radius: 14px;
    border: 1px solid var(--border);
    padding: 22px 26px;
    box-shadow: var(--shadow-md);
    margin-bottom: 18px;
  }

  /* Figure rendering */
  figure.fig {
    margin: 4px 0 14px;
    text-align: center;
  }
  figure.fig img {
    display: inline-block; max-width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  figure.fig figcaption {
    font-size: 11px; color: var(--muted);
    margin-top: 6px; font-style: italic;
  }

  /* Question stem */
  .stem {
    font-size: 16px; line-height: 1.65;
    margin: 8px 0 16px;
  }

  /* MCQ */
  .mcq-options {
    display: flex; flex-direction: column; gap: 10px;
    margin: 12px 0;
  }
  .mcq-option {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    cursor: pointer;
    font-size: 15px;
    display: flex; align-items: center; gap: 12px;
    transition: border-color 0.15s, background 0.15s, transform 0.05s;
    text-align: left;
    width: 100%; font-family: inherit; color: var(--text);
  }
  .mcq-option:hover:not(.disabled) {
    border-color: var(--accent); background: var(--accent-soft);
  }
  .mcq-option.selected {
    border-color: var(--accent); background: var(--accent-soft);
  }
  .mcq-option.correct {
    border-color: var(--good); background: var(--good-soft); color: var(--good);
  }
  .mcq-option.wrong {
    border-color: var(--bad); background: var(--bad-soft); color: var(--bad);
  }
  .mcq-option.disabled { cursor: default; opacity: 0.7; }
  .mcq-option .marker {
    width: 24px; height: 24px; border-radius: 50%;
    border: 1.5px solid var(--border-strong);
    flex: 0 0 24px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--muted);
    background: var(--panel);
  }
  .mcq-option.selected .marker {
    border-color: var(--accent); background: var(--accent); color: white;
  }
  .mcq-option.correct .marker { background: var(--good); border-color: var(--good); color: white; }
  .mcq-option.wrong .marker { background: var(--bad); border-color: var(--bad); color: white; }

  /* Image-as-option MCQ — used when each option is itself a figure (e.g. WE1
     apple-branch options). Grid layout, larger touch target, image fills the
     button below a small letter badge. */
  .mcq-options.is-image-grid {
    display: grid; grid-template-columns: 1fr; gap: 10px;
  }
  .mcq-option.is-image {
    flex-direction: column; align-items: stretch; padding: 10px 12px;
  }
  .mcq-option.is-image .marker { align-self: flex-start; }
  .mcq-option.is-image img {
    display: block; width: 100%; height: auto; max-height: 88px;
    object-fit: contain; margin-top: 6px;
    background: #fff; border-radius: 6px;
  }

  /* Fill in blank */
  .fib-row {
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap; margin: 10px 0;
  }
  .fib-input {
    background: var(--panel);
    border: 2px solid var(--border-strong);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 16px; font-family: inherit;
    width: 80px; text-align: center;
    color: var(--text);
  }
  .fib-input:focus { outline: none; border-color: var(--accent); }
  .fib-input.correct { border-color: var(--good); background: var(--good-soft); color: var(--good); font-weight: 600; }
  .fib-input.wrong { border-color: var(--bad); background: var(--bad-soft); color: var(--bad); font-weight: 600; }

  /* Stacked fraction — inline visual that mirrors KaTeX's \frac{a}{b}. Either
     half can be a fixed number or a text input the student fills in. Used in
     every prompt with {blank}/{blank}, {blank}/N, N/{blank}, and standalone
     answer inputs for fraction-format FIBs. */
  .stacked-frac {
    display: inline-flex; flex-direction: column; align-items: center;
    vertical-align: middle; margin: 0 4px;
    font-family: "KaTeX_Math", "Times New Roman", serif;
    min-width: 44px;
    position: relative; top: -0.15em;
  }
  .stacked-frac .num, .stacked-frac .den {
    display: block; padding: 0 4px;
    font-size: 1em; line-height: 1.2; text-align: center;
  }
  .stacked-frac .num { padding-bottom: 2px; }
  .stacked-frac .den { padding-top: 2px; }
  .stacked-frac .bar {
    display: block; width: 100%; height: 1.5px;
    background: var(--text);
  }
  .stacked-frac.correct .bar { background: var(--good); }
  .stacked-frac.wrong .bar { background: var(--bad); }
  /* Smaller text input inside the stacked fraction */
  .stacked-frac .fib-input {
    width: 56px; padding: 4px 6px; font-size: 16px;
    background: var(--panel);
    border: 1.5px dashed var(--border-strong);
    border-radius: 5px;
  }
  .stacked-frac .fib-input.correct { border-style: solid; }
  .stacked-frac .fib-input.wrong { border-style: solid; }
  /* Inline single-blank input embedded mid-sentence */
  .inline-blank {
    display: inline-block;
    width: 64px; padding: 4px 8px; font-size: 16px;
    background: var(--panel);
    border: 1.5px dashed var(--border-strong);
    border-radius: 6px; text-align: center;
    margin: 0 4px; vertical-align: middle;
    font-family: inherit; color: var(--text);
  }
  .inline-blank:focus { outline: none; border-color: var(--accent); border-style: solid; }
  .inline-blank.correct { border-color: var(--good); background: var(--good-soft); color: var(--good); border-style: solid; }
  .inline-blank.wrong   { border-color: var(--bad);  background: var(--bad-soft);  color: var(--bad);  border-style: solid; }

  /* Custom numeric keypad — opens when a [data-keypad="1"] input is focused.
     Sample wired to IL Step 2 only for now. */
  .num-keypad {
    position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%);
    background: var(--panel); border: 1.5px solid var(--border-strong);
    border-radius: 14px; padding: 10px; z-index: 1000;
    box-shadow: 0 12px 32px rgba(0,0,0,0.18);
    display: none;
    grid-template-columns: repeat(3, 56px); grid-auto-rows: 48px; gap: 8px;
  }
  .num-keypad.open { display: grid; }
  .num-keypad button {
    background: var(--panel);
    border: 1.5px solid var(--border-strong);
    border-radius: 10px;
    font-size: 20px; font-weight: 600;
    color: var(--text); cursor: pointer;
    font-family: inherit;
  }
  .num-keypad button:hover { background: var(--bg); }
  .num-keypad button:active { transform: translateY(1px); }
  .num-keypad .kp-frac { color: var(--accent); }
  .num-keypad .kp-dot  { color: var(--text); }
  .num-keypad .kp-back { color: var(--bad); }
  .num-keypad .kp-done {
    grid-column: span 2; background: var(--accent); color: #fff;
    border-color: var(--accent); font-size: 15px;
  }

  /* Action bar */
  .actions {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    margin-top: 18px;
  }
  .btn {
    background: var(--panel);
    color: var(--text);
    border: 1.5px solid var(--border-strong);
    border-radius: 8px;
    padding: 9px 16px;
    font-size: 14px; font-weight: 600; font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.05s;
  }
  .btn:hover:not(:disabled) { background: var(--panel-soft); }
  .btn:active:not(:disabled) { transform: translateY(1px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.primary {
    background: var(--accent); color: white; border-color: var(--accent);
  }
  .btn.primary:hover:not(:disabled) {
    background: #4859e8; border-color: #4859e8;
  }
  .btn.ghost { border-color: transparent; }
  .btn.ghost:hover:not(:disabled) { background: var(--panel-soft); }
  .btn-spacer { flex: 1; }

  /* Feedback */
  .feedback {
    padding: 12px 16px; border-radius: 8px;
    font-size: 14px; margin-top: 12px;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .feedback.good {
    background: var(--good-soft); color: var(--good);
    border-left: 4px solid var(--good);
    animation: glow-correct 0.6s ease-out;
  }
  .feedback.bad {
    background: var(--bad-soft); color: var(--bad);
    border-left: 4px solid var(--bad);
    animation: shake-wrong 0.4s ease-out;
  }
  @keyframes glow-correct {
    0%   { box-shadow: 0 0 0 0 rgba(34,197,94,0.55); transform: scale(0.98); }
    40%  { box-shadow: 0 0 0 8px rgba(34,197,94,0.18); transform: scale(1.02); }
    100% { box-shadow: 0 0 0 0 rgba(34,197,94,0);    transform: scale(1); }
  }
  @keyframes shake-wrong {
    0%, 100% { transform: translateX(0); }
    20%      { transform: translateX(-5px); }
    40%      { transform: translateX(5px); }
    60%      { transform: translateX(-3px); }
    80%      { transform: translateX(3px); }
  }
  @keyframes panel-fade-in {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .panel.is-fresh {
    animation: panel-fade-in 0.4s ease-out;
  }
  .mcq-options.is-wrong {
    animation: shake-wrong 0.4s ease-out;
  }
  .auto-advance-bar {
    height: 3px; margin-top: 10px; border-radius: 2px;
    background: var(--good-soft); overflow: hidden;
  }
  .auto-advance-bar > span {
    display: block; height: 100%; width: 0;
    background: var(--good);
    animation: auto-advance-fill var(--advance-ms, 900ms) linear forwards;
  }
  @keyframes auto-advance-fill {
    0%   { width: 0; }
    100% { width: 100%; }
  }
  .feedback.info {
    background: var(--accent-soft); color: var(--accent);
    border-left: 4px solid var(--accent);
  }
  .feedback .icon { font-size: 18px; flex: 0 0 18px; }
  .feedback strong { font-weight: 700; }
  .feedback .counter {
    color: var(--muted); font-weight: 500;
    margin-left: 6px; opacity: 0.85;
  }

  /* Answer reveal — replaces the old ℹ info row + duplicate explanation.
     Matches the sample player: one panel with 💡 + "Answer: X" header (blue)
     and the explanation underneath in muted text. Used for wrong-shown and
     (optionally) on-correct when there's an explanation worth surfacing. */
  .answer-reveal {
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 16px 20px;
    margin-top: 14px;
  }
  .answer-reveal .header {
    display: flex; align-items: center; gap: 8px;
    font-size: 17px; font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .answer-reveal .header .lightbulb { font-size: 20px; }
  .answer-reveal .body {
    color: var(--text); font-size: 14px; line-height: 1.6;
    opacity: 0.85;
  }

  /* Hints */
  .hints {
    margin-top: 14px;
    border-top: 1px dashed var(--border);
    padding-top: 14px;
  }
  .hint-list {
    display: flex; flex-direction: column; gap: 10px;
  }
  .hint {
    background: var(--panel-soft);
    border-left: 3px solid var(--accent);
    padding: 10px 14px;
    border-radius: 0 6px 6px 0;
    font-size: 14px; color: var(--text);
  }
  .hint .label {
    font-weight: 700; color: var(--accent); margin-right: 6px;
  }

  /* Explanation (reveal) */
  .explanation {
    background: var(--accent-soft);
    border-left: 4px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 14px 16px;
    margin-top: 14px;
    font-size: 14px;
  }
  .explanation .label {
    font-weight: 700; color: var(--accent);
    display: block; margin-bottom: 6px;
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
  }

  /* Insight (yellow lightbulb-style) */
  .insight {
    background: #fff8e6;
    border-left: 4px solid var(--warn);
    border-radius: 0 8px 8px 0;
    padding: 12px 16px;
    margin: 12px 0;
    font-size: 14px;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .insight .icon { font-size: 18px; flex: 0 0 18px; }

  /* Revision card grid (Key Insight block, card mode) */
  .revision-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 14px;
    margin: 8px 0 18px;
  }
  .revision-card {
    background: var(--panel-soft);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 10px;
    transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
  }
  .revision-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(133, 15, 133, 0.08);
  }
  .revision-card-head {
    display: flex; align-items: center; gap: 8px;
    font-weight: 600; font-size: 15px; color: var(--text);
  }
  .revision-card-icon { font-size: 20px; flex: 0 0 auto; }
  .revision-card-title { line-height: 1.2; }
  .revision-card-concept {
    font-size: 13.5px; line-height: 1.5; color: var(--text);
  }
  .revision-card-example {
    background: var(--panel); border: 1px dashed var(--border-strong);
    border-radius: 6px; padding: 8px 10px; font-size: 14px;
    text-align: center; color: var(--text);
  }
  .revision-card-example-text { font-family: inherit; }
  .revision-cheat {
    margin: 8px 0 4px; padding: 14px 16px;
    background: var(--panel-soft); border-radius: 10px;
    display: flex; flex-direction: column; gap: 6px; align-items: flex-start;
  }
  .revision-cheat-hint {
    font-size: 12.5px; color: var(--muted);
  }

  /* Rule table / summary table */
  table.rule {
    width: 100%; border-collapse: collapse;
    margin: 14px 0; font-size: 14px;
    background: var(--panel-soft); border-radius: 8px; overflow: hidden;
  }
  table.rule th, table.rule td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    text-align: left;
    vertical-align: top;
  }
  table.rule th {
    color: var(--muted); font-weight: 600;
    font-size: 12px; text-transform: uppercase;
    letter-spacing: 0.4px;
    background: var(--panel);
  }
  table.rule tr:last-child td { border-bottom: none; }

  /* Bottom nav */
  .bottom-nav {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 24px; padding: 18px 0 0;
    border-top: 1px solid var(--border);
  }

  /* Scaffold (worked example) */
  .scaffold {
    margin-top: 18px;
    background: var(--pyq-soft);
    border: 1px solid var(--pyq);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .scaffold-header {
    font-size: 13px; font-weight: 700; color: var(--pyq);
    text-transform: uppercase; letter-spacing: 0.6px;
    margin-bottom: 12px;
  }
  .scaffold-step {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .scaffold-step .step-num {
    color: var(--pyq); font-weight: 700; font-size: 12px;
    text-transform: uppercase; margin-bottom: 6px;
  }

  /* Mastery summary */
  .mastery-result {
    text-align: center; padding: 40px 30px;
  }
  .mastery-result .score {
    font-size: 56px; font-weight: 800; line-height: 1;
    color: var(--accent); margin-bottom: 8px;
  }
  .mastery-result .score.pass { color: var(--good); }
  .mastery-result .score.fail { color: var(--bad); }

<body>

<header class="app">
  <div class="left">
    <a href="lesson-viewer.html?lesson=1-1">← Spec preview</a>
  </div>
  <div class="center">

  </div>
  <div class="right">

      <span id="pct">0%</span>

    </div>

    <button id="sound-toggle" type="button" title="Toggle sound" onclick="toggleSound()"
            style="background:transparent;border:1px solid var(--border);color:var(--text);
                   width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:16px;
                   margin-left:8px">🔊</button>
  </div>

  </aside>
