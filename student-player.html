<script>
// ─── Lesson selection (?lesson=1-1 default) ───────────────────────
const CATALOG = {
  '1-1': { json: 'lesson-1-1-fractions.json', figDir: 'Figures/lesson-1-1/' },
  '1-2': { json: 'lesson-1-2-fraction-mult-div.json', figDir: 'Figures/lesson-1-2/' },
  '1-3': { json: 'lesson-1-3-decimals.json', figDir: 'Figures/lesson-1-3/' },
  '1-4': { json: 'lesson-1-4-percentages.json', figDir: 'Figures/lesson-1-4/' },
};
const SLUG = (new URLSearchParams(location.search).get('lesson') || '1-1').trim();
const CFG = CATALOG[SLUG] || CATALOG['1-1'];
// Focus mode: ?ilstep=N renders ONLY interactive-lesson step N (no chrome, no
// nav, no auto-advance) — used to embed one IL step per Learnosity item.
const FOCUS_STEP = (() => {
  const v = new URLSearchParams(location.search).get('ilstep');
  return v != null && v !== '' ? parseInt(v, 10) : null;
})();
// ?focus=<absIdx> focuses ANY single flattened item (CF/WE/PL/MC/CE/cards), same
// chrome-less full-width treatment as ?ilstep. Used to embed one item per Learnosity item.
const FOCUS_ITEM = (() => {
  const v = new URLSearchParams(location.search).get('focus');
  return v != null && v !== '' ? parseInt(v, 10) : null;
})();
const FOCUS = (FOCUS_STEP != null) || (FOCUS_ITEM != null);

// ─── State ─────────────────────────────────────────────────────────
const state = {
  lesson: null,
  items: [],      // flat list of nav-units
  cursor: 0,      // current item index in items[]
  itemState: {},  // {itemId: {attempts, hintsShown, answer, status, scaffoldOpen, subAnswers}}
  xp: 0,
  soundOn: localStorage.getItem('lessonSoundOn') !== 'false',  // default ON
  pendingAdvance: null,  // {timer, deadline} for auto-advance
};

// ─── Sound engine (Web Audio API, mirrors cms-app soundEngine.js) ──
const SoundEngine = (() => {
  let ctx = null;
  function getCtx() {
    if (!ctx) {
      try { ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch { return null; }
    }
    if (ctx.state === 'suspended') ctx.resume().catch(() => {});
    return ctx;
  }
  function tone(freq, durSec, type = 'sine', delay = 0, endFreq = null, peakGain = 0.18) {
    if (!state.soundOn) return;
    const c = getCtx(); if (!c) return;
    const t0 = c.currentTime + delay;
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if (endFreq !== null) osc.frequency.exponentialRampToValueAtTime(endFreq, t0 + durSec);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(peakGain, t0 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + durSec);
    osc.connect(gain).connect(c.destination);
    osc.start(t0);
    osc.stop(t0 + durSec + 0.02);
  }
  return {
    playCorrect()    { tone(659.25, 0.15, 'sine'); tone(783.99, 0.25, 'sine', 0.08); },     // E5 → G5
    playIncorrect()  { tone(300, 0.20, 'triangle', 0, 200, 0.14); },                        // descending buzz
    playHintReveal() { tone(480, 0.18, 'sine', 0, 523.25, 0.13); },                         // soft pop → C5
  };
})();

function toggleSound() {
  state.soundOn = !state.soundOn;
  localStorage.setItem('lessonSoundOn', state.soundOn ? 'true' : 'false');
  const btn = document.getElementById('sound-toggle');
  if (btn) btn.textContent = state.soundOn ? '🔊' : '🔇';
}

// ─── Auto-advance after correct / wrong-shown ────────────────────
function cancelAutoAdvance() {
  if (state.pendingAdvance) {
    clearTimeout(state.pendingAdvance.timer);
    state.pendingAdvance = null;
  }
}
function scheduleAutoAdvance(ms) {
  if (FOCUS) return;   // single-item embed: never advance
  cancelAutoAdvance();
  state.pendingAdvance = {
    deadline: Date.now() + ms,
    timer: setTimeout(() => { state.pendingAdvance = null; nextItem(); }, ms),
  };
}
// Timings from cms-app migration spec (§12 Magic Numbers):
//   Correct answer → 900ms · Wrong-shown (final reveal) → 3000ms.
//   IL steps → a touch longer so the discovery / insight message is readable.
const ADVANCE_CORRECT_MS = 900;
const ADVANCE_WRONG_SHOWN_MS = 3000;
const ADVANCE_IL_MS = 1600;

// ─── Small DOM helpers ────────────────────────────────────────────
function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') node.className = v;
    else if (k === 'html') node.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2), v);
    else if (v !== false && v != null) node.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return node;
}
const $ = sel => document.querySelector(sel);

// ─── Math (KaTeX) ─────────────────────────────────────────────────
function mathifyText(s) {
  if (!s) return s;
  // Parenthesised fractions: (a × c)/(b × d), (a-b)/(c-d) → stacked. Run BEFORE
  // the global ×/÷ replace so the captured groups still hold raw symbols.
  s = s.replace(/\(([^()]+)\)\s*\/\s*\(([^()]+)\)/g, (_, n, d) => {
    const fix = t => t.replace(/×/g, ' \\times ').replace(/÷/g, ' \\div ').replace(/\s+/g, ' ').trim();
    return `\\(\\dfrac{${fix(n)}}{${fix(d)}}\\)`;
  });
  // Numeric fractions: 2/3 → stacked
  s = s.replace(/(?<![.\d])(\d+)\/(\d+)(?!\d|\.\d)/g,
    (_, n, d) => `\\(\\dfrac{${n}}{${d}}\\)`);
  // The format hint "top/bottom" → stacked words
  s = s.replace(/\btop\/bottom\b/g, '\\(\\dfrac{\\text{top}}{\\text{bottom}}\\)');
  // Single-letter variable fractions: a/b, c/d, b/a (boundaries avoid and/or etc.)
  s = s.replace(/(?<![A-Za-z0-9\\{}])([a-z])\/([a-z])(?![A-Za-z0-9{}])/g,
    (_, n, d) => `\\(\\dfrac{${n}}{${d}}\\)`);
  s = s.replace(/(\d)\s*×\s*(\d)/g, '$1 \\(\\times\\) $2');
  s = s.replace(/(\d)\s*÷\s*(\d)/g, '$1 \\(\\div\\) $2');
  s = s.replace(/×/g, '\\(\\times\\)');
  s = s.replace(/÷/g, '\\(\\div\\)');
  s = s.replace(/≤/g, '\\(\\leq\\)');
  s = s.replace(/≥/g, '\\(\\geq\\)');
  s = s.replace(/≠/g, '\\(\\neq\\)');
  return s;
}
function mathifyDom(root) {
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);
  for (const node of nodes) {
    let p = node.parentNode, skip = false;
    while (p && p !== root) {
      const tn = p.tagName;
      if (tn === 'CODE' || tn === 'PRE' || tn === 'SCRIPT' || tn === 'STYLE' || tn === 'INPUT') { skip = true; break; }
      // Skip anything inside a .katex node (already KaTeX-rendered) or any
      // element opted out of math rendering via .no-math (e.g. counters like
      // "(1 of 2)" — purely UI text, never a fraction).
      if (p.classList && (p.classList.contains('katex') || p.classList.contains('no-math'))) { skip = true; break; }
      p = p.parentNode;
    }
    if (skip) continue;
    const replaced = mathifyText(node.nodeValue);
    if (replaced !== node.nodeValue) {
      const span = document.createElement('span');
      span.innerHTML = replaced;
      node.parentNode.replaceChild(span, node);
    }
  }
  if (window.renderMathInElement) {
    renderMathInElement(root, {
      delimiters: [
        { left: '\\(', right: '\\)', display: false },
        { left: '$$', right: '$$', display: true },
      ],
      throwOnError: false,
    });
  }
}

// ─── Figure resolution ────────────────────────────────────────────
// Render a stem with the figure placed intelligently. Authors can include
// the marker {figure} anywhere in question_text to drop the image at that
// point (e.g. "Setup sentence. {figure} Now the question?"). Without the
// marker, the figure renders first as a standalone illustration above the
// stem (the previous default). When the figure is INLINE (marker present),
// we skip the italic caption — the surrounding text already provides
// context, and stacking caption between two halves of a sentence reads
// awkwardly.
function renderStemWithFigure(stemText, figDesc, figPath) {
  const out = document.createDocumentFragment();
  const stem = stemText || '';
  const marker = '{figure}';
  const idx = stem.indexOf(marker);
  const hasFig = !!(figPath || figDesc);
  function addStem(t) {
    if (t && t.trim()) out.appendChild(el('div', { class: 'stem' }, t.trim()));
  }
  function addFig(includeCaption) {
    if (!hasFig) return;
    const fig = renderFigure(includeCaption ? figDesc : null, figPath);
    if (fig) out.appendChild(fig);
  }
  if (idx === -1) {
    // No marker — figure stands alone above the question
    addFig(true);
    addStem(stem);
  } else {
    addStem(stem.slice(0, idx));
    addFig(false); // inline — context comes from surrounding text
    addStem(stem.slice(idx + marker.length));
  }
  return out;
}

function resolveFigPath(p) {
  if (!p) return null;
  let s = p;
  if (s.startsWith('../')) s = s.slice(3);
  if (!s.includes('/') && s.startsWith('MK_')) s = CFG.figDir + s;
  return s;
}
function renderFigure(desc, path) {
  if (!path && !desc) return null;
  const fig = el('figure', { class: 'fig' });
  if (path) {
    const img = el('img', { src: resolveFigPath(path), alt: desc || path });
    img.addEventListener('error', () => { img.style.display = 'none'; });
    fig.appendChild(img);
  }
  return fig;
}

// ─── Item flattening: blocks → flat nav units ─────────────────────
// Each nav-unit is one screen the student sees. Most blocks already
// map 1:1 to items (CF questions, Practice questions, MC questions,
// CE). IL is special — each of the 11 steps becomes one nav-unit. WE
// is one MCQ per example, with scaffold expandable inline.
function buildItems(lesson) {
  const items = [];
  let absIdx = 0;
  for (let bi = 0; bi < lesson.blocks.length; bi++) {
    const block = lesson.blocks[bi];
    const blockMeta = {
      blockIdx: bi,
      blockType: block.block_type,
      blockTitle: block.title || block.block_type,
    };
    if (block.block_type === 'challenge_first' || block.block_type === 'practice_lab' ||
        block.block_type === 'challenge_extension') {
      (block.questions || []).forEach((q, qi) => {
        items.push({
          ...blockMeta, id: q.id || `${block.block_type}-${qi}`,
          kind: 'question', data: q,
          posInBlock: qi + 1, totalInBlock: block.questions.length,
          absIdx: absIdx++,
        });
      });
    } else if (block.block_type === 'mastery_check') {
      (block.questions || []).forEach((q, qi) => {
        items.push({
          ...blockMeta, id: q.id || `mc-${qi}`,
          kind: 'mc-question', data: q,
          posInBlock: qi + 1, totalInBlock: block.questions.length,
          mcIdx: qi, mcTotal: block.questions.length, mcThreshold: block.pass_threshold || 3,
          absIdx: absIdx++,
        });
      });
      // synthesized summary at end of MC block
      items.push({
        ...blockMeta, id: 'mc-summary',
        kind: 'mc-summary',
        mcTotal: block.questions.length, mcThreshold: block.pass_threshold || 3,
        posInBlock: block.questions.length + 1, totalInBlock: block.questions.length + 1,
        absIdx: absIdx++,
      });
    } else if (block.block_type === 'worked_examples') {
      (block.examples || []).forEach((we, qi) => {
        items.push({
          ...blockMeta, id: we.id,
          kind: 'worked-example', data: we,
          posInBlock: qi + 1, totalInBlock: block.examples.length,
          absIdx: absIdx++,
        });
      });
    } else if (block.block_type === 'interactive_lesson') {
      (block.steps || []).forEach((step, si) => {
        items.push({
          ...blockMeta, id: `S${step.step}`,
          kind: 'il-step', data: step,
          posInBlock: si + 1, totalInBlock: block.steps.length,
          absIdx: absIdx++,
        });
      });
    } else if (block.block_type === 'key_insight') {
      items.push({
        ...blockMeta, id: 'key-insight',
        kind: 'key-insight', data: block,
        posInBlock: 1, totalInBlock: 1,
        absIdx: absIdx++,
      });
    }
  }
  return items;
}

// ─── Sidebar render ───────────────────────────────────────────────
function renderSidebar() {
  const list = $('#block-list');
  list.innerHTML = '';
  const byBlock = {};
  state.items.forEach(it => {
    if (!byBlock[it.blockIdx]) byBlock[it.blockIdx] = { meta: it, total: 0, done: 0 };
    byBlock[it.blockIdx].total += 1;
    const itSt = state.itemState[it.id];
    if (itSt && (itSt.status === 'correct' || itSt.status === 'wrong-shown' || itSt.status === 'completed')) {
      byBlock[it.blockIdx].done += 1;
    }
  });
  const current = state.items[state.cursor];
  Object.values(byBlock).forEach(b => {
    const node = el('li', { class: 'block-item' + (b.done === b.total && b.total > 0 ? ' done' : '') + (current && current.blockIdx === b.meta.blockIdx ? ' active' : '') },
      el('span', { class: 'status' }, b.done === b.total && b.total > 0 ? '✓' : String(b.meta.blockIdx + 1)),
      el('span', { class: 'title' }, b.meta.blockTitle || b.meta.blockType),
      el('span', { class: 'count' }, b.total > 1 ? `${b.done}/${b.total}` : ''),
    );
    node.addEventListener('click', () => {
      // jump to first item of this block
      const firstItem = state.items.findIndex(x => x.blockIdx === b.meta.blockIdx);
      if (firstItem >= 0) { state.cursor = firstItem; render(); }
    });
    list.appendChild(node);
  });
}

// ─── Progress / XP ────────────────────────────────────────────────
function recalcProgress() {
  const total = state.items.length;
  const done = state.items.filter(it => {
    const st = state.itemState[it.id];
    return st && (st.status === 'correct' || st.status === 'wrong-shown' || st.status === 'completed');
  }).length;
  const pct = total ? Math.round(done * 100 / total) : 0;
  $('#pct').textContent = pct + '%';
  $('#bar-fill').style.width = pct + '%';
  $('#xp').textContent = `+${state.xp} XP`;
}

// ─── Item state helpers ───────────────────────────────────────────
function getSt(id) {
  if (!state.itemState[id]) {
    state.itemState[id] = { attempts: 0, hintsShown: 0, status: 'pending', answer: null, scaffoldOpen: false, subAnswers: {} };
  }
  return state.itemState[id];
}

// ─── Prompt tokenizer + stacked-fraction inputs ───────────────────
// Lesson JSON encodes blanks with {blank}, {blank1}, {blank2}, {0}, {1}.
// We render them inline as inputs — never showing the literal placeholder
// text to the student. The four patterns we recognise (in order):
//   {blankN}/{blankM}  → stacked fraction, both halves are inputs
//   {blankN}/(\d+)     → stacked fraction, numerator is input
//   (\d+)/{blankN}     → stacked fraction, denominator is input
//   {blankN}           → single inline input
// A {N}-style cloze placeholder is also treated like {blank}.
function tokenizePrompt(str) {
  const tokens = [];
  let i = 0;
  const re = {
    blankBlank: /^\{(?:blank\d*|\d+)\}\s*\/\s*\{(?:blank\d*|\d+)\}/,
    blankNum:   /^\{(?:blank\d*|\d+)\}\s*\/\s*(\d+)/,
    numBlank:   /^(\d+)\s*\/\s*\{(?:blank\d*|\d+)\}/,
    blank:      /^\{(?:blank\d*|\d+)\}/,
  };
  while (i < str.length) {
    const rest = str.slice(i);
    let m;
    if ((m = rest.match(re.blankBlank))) {
      tokens.push({ kind: 'frac', topBlank: true, botBlank: true });
      i += m[0].length;
    } else if ((m = rest.match(re.blankNum))) {
      tokens.push({ kind: 'frac', topBlank: true, bot: m[1] });
      i += m[0].length;
    } else if ((m = rest.match(re.numBlank))) {
      tokens.push({ kind: 'frac', top: m[1], botBlank: true });
      i += m[0].length;
    } else if ((m = rest.match(re.blank))) {
      tokens.push({ kind: 'blank' });
      i += m[0].length;
    } else {
      const prev = tokens[tokens.length - 1];
      if (prev && prev.kind === 'text') prev.content += str[i];
      else tokens.push({ kind: 'text', content: str[i] });
      i += 1;
    }
  }
  return tokens;
}

// Count how many input boxes a tokenised prompt produces. Used to size the
// st.fibVals array before any keystrokes arrive.
function countBlanks(tokens) {
  let n = 0;
  for (const t of tokens) {
    if (t.kind === 'frac') n += (t.topBlank ? 1 : 0) + (t.botBlank ? 1 : 0);
    else if (t.kind === 'blank') n += 1;
  }
  return n;
}

// Build a stacked-fraction DOM node. Either half may be a fixed number
// (`top` / `bot`) or a student input (`topBlank` / `botBlank`).
function makeStackedFrac({ topBlank, botBlank, top, bot, st, valOffset, onChange, disabled, status }) {
  const wrap = el('span', { class: 'stacked-frac' + (status ? ' ' + status : '') });
  function blankInput(idx) {
    const inp = el('input', {
      class: 'fib-input' + (status ? ' ' + status : ''),
      type: 'text', value: (st.fibVals && st.fibVals[idx]) || '',
      placeholder: '?',
    });
    inp.disabled = !!disabled;
    inp.addEventListener('input', e => {
      st.fibVals[idx] = e.target.value;
      if (onChange) onChange();
    });
    return inp;
  }
  // Numerator
  let cursor = valOffset;
  const numHost = el('span', { class: 'num' });
  if (topBlank) { numHost.appendChild(blankInput(cursor)); cursor += 1; }
  else numHost.appendChild(document.createTextNode(top));
  wrap.appendChild(numHost);
  // Bar
  wrap.appendChild(el('span', { class: 'bar' }));
  // Denominator
  const denHost = el('span', { class: 'den' });
  if (botBlank) { denHost.appendChild(blankInput(cursor)); cursor += 1; }
  else denHost.appendChild(document.createTextNode(bot));
  wrap.appendChild(denHost);
  return wrap;
}

// Build a single inline input (for plain {blank} placeholders).
function makeInlineInput({ st, valOffset, onChange, disabled, status }) {
  const inp = el('input', {
    class: 'inline-blank' + (status ? ' ' + status : ''),
    type: 'text', value: (st.fibVals && st.fibVals[valOffset]) || '',
    placeholder: '?',
  });
  inp.disabled = !!disabled;
  inp.addEventListener('input', e => {
    st.fibVals[valOffset] = e.target.value;
    if (onChange) onChange();
  });
  return inp;
}

// ─── Custom numeric keypad ────────────────────────────────────────
// Sample wired to IL Step 2 only — opt in by tagging an input with
// `data-keypad="1"` (see renderILStep). The keypad is a single global
// singleton appended to <body> on first use. Typing inserts at the
// caret of the currently focused input; `/` jumps to the next blank
// (so {blank}/{blank} flows numerator → denominator).
const Keypad = (() => {
  let root = null;
  let target = null;

  function ensureRoot() {
    if (root) return root;
    root = document.createElement('div');
    root.className = 'num-keypad';
    const keys = ['1','2','3','4','5','6','7','8','9','.','0','/'];
    for (const k of keys) {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = k;
      if (k === '/') b.className = 'kp-frac';
      if (k === '.') b.className = 'kp-dot';
      b.addEventListener('mousedown', e => e.preventDefault()); // keep focus
      b.addEventListener('click', () => press(k));
      root.appendChild(b);
    }
    // Backspace — its own row, single-column width
    const back = document.createElement('button');
    back.type = 'button'; back.textContent = '⌫'; back.className = 'kp-back';
    back.addEventListener('mousedown', e => e.preventDefault());
    back.addEventListener('click', () => press('⌫'));
    root.appendChild(back);
    // Done — spans the remaining 2 columns of the last row
    const done = document.createElement('button');
    done.type = 'button'; done.textContent = 'Done'; done.className = 'kp-done';
    done.addEventListener('mousedown', e => e.preventDefault());
    done.addEventListener('click', hide);
    root.appendChild(done);
    document.body.appendChild(root);
    return root;
  }

  function insertAtCaret(input, text) {
    const s = input.selectionStart ?? input.value.length;
    const e = input.selectionEnd ?? input.value.length;
    input.value = input.value.slice(0, s) + text + input.value.slice(e);
    const pos = s + text.length;
    input.setSelectionRange(pos, pos);
  }

  function backspaceAtCaret(input) {
    const s = input.selectionStart ?? input.value.length;
    const e = input.selectionEnd ?? input.value.length;
    if (s === e && s > 0) {
      input.value = input.value.slice(0, s - 1) + input.value.slice(e);
      input.setSelectionRange(s - 1, s - 1);
    } else {
      input.value = input.value.slice(0, s) + input.value.slice(e);
      input.setSelectionRange(s, s);
    }
  }

  function focusNextBlank(input) {
    const all = Array.from(document.querySelectorAll(
      '[data-keypad="1"]:not([disabled])'
    ));
    const i = all.indexOf(input);
    if (i >= 0 && i < all.length - 1) all[i + 1].focus();
  }

  function press(key) {
    if (!target) return;
    if (key === '⌫') backspaceAtCaret(target);
    else if (key === '/') {
      // In a stacked-fraction layout ({blank}/{blank}), "/" jumps to the
      // next blank. In a single inline blank, "/" inserts the slash as a
      // character (so the student can type fraction strings like "3/5").
      if (target.closest && target.closest('.stacked-frac')) {
        focusNextBlank(target);
        return;
      }
      insertAtCaret(target, '/');
    }
    else insertAtCaret(target, key);
    target.dispatchEvent(new Event('input', { bubbles: true }));
  }

  function show(input) {
    ensureRoot();
    target = input;
    root.classList.add('open');
  }
  function hide() {
    if (root) root.classList.remove('open');
    target = null;
  }

  // Global focus/blur delegation — only acts on inputs tagged data-keypad="1".
  document.addEventListener('focusin', e => {
    const t = e.target;
    if (t && t.matches && t.matches('input[data-keypad="1"]')) show(t);
  });
  document.addEventListener('focusout', e => {
    // Defer so a click on a keypad button (which immediately re-focuses
    // the input) doesn't close the keypad.
    setTimeout(() => {
      const a = document.activeElement;
      if (!a || !a.matches || !a.matches('input[data-keypad="1"]')) hide();
    }, 0);
  });

  // Tag every fib/inline input inside `rootEl` so the keypad will open
  // when one of them is focused. Also suppresses the native mobile
  // keyboard via inputmode="none".
  function attach(rootEl) {
    if (!rootEl) return;
    rootEl.querySelectorAll('.fib-input, .inline-blank').forEach(inp => {
      inp.setAttribute('data-keypad', '1');
      inp.setAttribute('inputmode', 'none');
      inp.setAttribute('autocomplete', 'off');
    });
  }

  return { attach, hide };
})();

// Render a prompt with inline inputs replacing all {blank}/.../ placeholders.
// Returns a DOM node. Side effect: ensures st.fibVals is sized correctly.
function renderInteractivePrompt(promptStr, st, onChange, disabled, status) {
  const tokens = tokenizePrompt(promptStr || '');
  const need = countBlanks(tokens);
  if (!Array.isArray(st.fibVals) || st.fibVals.length !== need) {
    const old = st.fibVals || [];
    st.fibVals = Array(need).fill('').map((_, i) => old[i] || '');
  }
  const out = el('span', { class: 'prompt-interactive' });
  let valOffset = 0;
  for (const t of tokens) {
    if (t.kind === 'text') {
      out.appendChild(document.createTextNode(t.content));
    } else if (t.kind === 'frac') {
      out.appendChild(makeStackedFrac({
        topBlank: t.topBlank, botBlank: t.botBlank, top: t.top, bot: t.bot,
        st, valOffset, onChange, disabled, status,
      }));
      valOffset += (t.topBlank ? 1 : 0) + (t.botBlank ? 1 : 0);
    } else if (t.kind === 'blank') {
      out.appendChild(makeInlineInput({ st, valOffset, onChange, disabled, status }));
      valOffset += 1;
    }
  }
  return out;
}

// Parse a "1/3" answer string into [numerator, denominator] for stacked input
// matching. Returns null if it's not a clean a/b string.
function parseFractionAnswer(a) {
  if (typeof a !== 'string') return null;
  const m = a.trim().match(/^(-?\d+)\s*\/\s*(-?\d+)$/);
  return m ? [m[1], m[2]] : null;
}

// ─── Renderers ────────────────────────────────────────────────────
// Each renderer builds and returns a single DOM node for the main pane.

function renderBreadcrumb(it) {
  const q = it.data || {};
  const isPyq = q.source === 'pyq' || (q.pyq && q.pyq.year);
  const pyqInfo = q.pyq;
  const inspired = q.inspired_by;
  return el('div', { class: 'breadcrumb' },
    el('span', { class: 'chip' }, it.blockTitle),
    isPyq && pyqInfo ?
      el('span', { class: 'pyq-chip' }, `PYQ ${pyqInfo.year} ${pyqInfo.question || pyqInfo.q || ''}`) :
      (q.source === 'original' ? el('span', { class: 'orig-chip' }, 'Original') : null),
    inspired ? el('span', { class: 'pyq-chip', style: 'background:transparent;border:1px dashed var(--pyq);color:var(--pyq)' },
      `Based on PYQ ${inspired.year} ${inspired.question || inspired.q || ''}`) : null,
    q.difficulty ? el('span', { class: 'diff-chip' }, q.difficulty + 'pt') : null,
    el('span', {}, `· ${it.posInBlock} of ${it.totalInBlock}`),
  );
}

// CF block has a non-negotiable rule: no hints. Wrong on 2nd attempt → reveal
// the answer + full explanation directly. All other blocks keep the 3-attempt
// hint-driven flow.
function isCF(it) { return it && it.blockType === 'challenge_first'; }
function wrongShownThresholdFor(it) { return isCF(it) ? 2 : 3; }

// MCQ renderer — used by CF, P, CE, and WE main question
function renderMCQ(it, opts = {}) {
  const q = it.data;
  const cfg = q.config || {};
  const options = cfg.options || q.options || [];
  const correctIdx = cfg.answer !== undefined ? cfg.answer : q.answer_index;
  const st = getSt(it.id);

  const panel = el('div', { class: 'panel' });
  panel.appendChild(renderBreadcrumb(it));
  panel.appendChild(el('div', { class: 'item-title' }, 'Choose one'));
  panel.appendChild(el('div', { class: 'item-counter' },
    `Block ${it.blockIdx + 1} · Question ${it.posInBlock} of ${it.totalInBlock}`));

  // Stem + figure together — author controls placement with a {figure} marker
  const figPath = q.figure || (q.figures && q.figures[0]);
  panel.appendChild(renderStemWithFigure(q.question_text || q.prompt || '', q.figure_description, figPath));

  // Options — supports text options (string) and image options ({ image, label? }).
  // Image-option detection mirrors renderILAction so Practice Lab / MC / CE / WE
  // can carry figure-in-options questions (e.g. P5 ribbon-pieces).
  const hasImages = options.some(o => o && typeof o === 'object' && o.image);
  const optionsBox = el('div', { class: 'mcq-options' + (hasImages ? ' is-image-grid' : '') });
  options.forEach((opt, i) => {
    const isImg = opt && typeof opt === 'object' && opt.image;
    const btn = el('button', {
      class: 'mcq-option' + (isImg ? ' is-image' : '') +
        (st.answer === i ? ' selected' : '') +
        (st.status === 'correct' && i === correctIdx ? ' correct' : '') +
        (st.status === 'wrong' && st.answer === i ? ' wrong' : '') +
        (st.status === 'wrong-shown' && i === correctIdx ? ' correct' : '') +
        (st.status === 'correct' || st.status === 'wrong-shown' ? ' disabled' : '')
    },
      el('span', { class: 'marker' }, String.fromCharCode(65 + i)),
    );
    if (isImg) {
      const img = el('img', { src: resolveFigPath(opt.image), alt: opt.label || `Option ${String.fromCharCode(65 + i)}` });
      img.addEventListener('error', () => { img.style.display = 'none'; });
      btn.appendChild(img);
      if (opt.label) btn.appendChild(el('span', { style: 'font-size:13px;color:var(--muted);margin-top:4px' }, opt.label));
    } else {
      btn.appendChild(el('span', {}, String(opt).replace(/^\([A-E]\)\s*/, '')));
    }
    if (st.status !== 'correct' && st.status !== 'wrong-shown') {
      btn.addEventListener('click', () => {
        st.answer = i;
        render();
      });
    }
    optionsBox.appendChild(btn);
  });
  panel.appendChild(optionsBox);

  // Action bar
  const cfBlock = isCF(it);
  const threshold = wrongShownThresholdFor(it);
  const actions = el('div', { class: 'actions' });
  if (st.status === 'pending' || st.status === 'wrong') {
    if (!cfBlock) actions.appendChild(makeHintButton(it));
    actions.appendChild(el('span', { class: 'btn-spacer' }));
    const submit = el('button', { class: 'btn primary' }, st.attempts > 0 ? 'Try again' : 'Submit');
    submit.disabled = st.answer == null;
    submit.addEventListener('click', () => {
      st.attempts += 1;
      if (st.answer === correctIdx) {
        st.status = 'correct';
        state.xp += 10;
        SoundEngine.playCorrect();
      } else if (st.attempts >= threshold) {
        st.status = 'wrong-shown';
        SoundEngine.playIncorrect();
      } else {
        st.status = 'wrong';
        SoundEngine.playIncorrect();
      }
      render();
    });
    actions.appendChild(submit);
  } else {
    actions.appendChild(el('span', { class: 'btn-spacer' }));
    actions.appendChild(el('button', { class: 'btn primary', onclick: nextItem }, 'Next →'));
  }
  panel.appendChild(actions);

  // Feedback + hints + explanation
  if (st.status === 'correct') {
    panel.appendChild(el('div', { class: 'feedback good' },
      el('span', { class: 'icon' }, '✓'),
      el('span', {}, st.attempts === 1 ? 'Correct! Nailed it on the first try.' : `Correct! Took ${st.attempts} ${st.attempts === 1 ? 'try' : 'tries'}.`),
    ));
    if (q.explanation) {
      panel.appendChild(el('div', { class: 'explanation' },
        el('span', { class: 'label' }, 'Explanation'),
        el('span', {}, q.explanation),
      ));
    }
  } else if (st.status === 'wrong') {
    panel.appendChild(makeWrongFeedback(st.attempts, threshold));
  } else if (st.status === 'wrong-shown') {
    // Single reveal panel matching the sample player: 💡 + Answer + body.
    // No separate ℹ row and no duplicate explanation below.
    panel.appendChild(makeAnswerRevealPanel(formatMCQAnswerForDisplay(cfg), q.explanation));
  }

  if (!cfBlock) panel.appendChild(makeHintsPanel(it));
  return panel;
}

// Fill-in-blank renderer — for single value or two-value (a/b)
// Two shapes the renderer handles:
//   (a) prompt has {blank} placeholders     → inputs rendered inline in prompt
//   (b) prompt has no placeholders          → input rendered after the stem
// Fraction-format answers ("1/3") get a stacked num/den pair either way.
function renderFIB(it) {
  const q = it.data;
  const cfg = q.config || {};
  const promptStr = q.question_text || q.prompt || '';
  const promptHasBlanks = /\{(?:blank\d*|\d+)\}/.test(promptStr);
  const isFractionAns = (cfg.format === 'fraction') ||
                        (typeof cfg.answer === 'string' && /^\d+\/\d+$/.test(cfg.answer));
  const st = getSt(it.id);

  const statusForUI =
    st.status === 'correct' ? 'correct' :
    (st.status === 'wrong' || st.status === 'wrong-shown') ? 'wrong' : '';
  const disabled = (st.status === 'correct' || st.status === 'wrong-shown');

  const panel = el('div', { class: 'panel' });
  panel.appendChild(renderBreadcrumb(it));
  panel.appendChild(el('div', { class: 'item-title' }, 'Fill in the answer'));
  panel.appendChild(el('div', { class: 'item-counter' },
    `Block ${it.blockIdx + 1} · Question ${it.posInBlock} of ${it.totalInBlock}`));

  const figPath = q.figure || (q.figures && q.figures[0]);

  // Action bar — re-created when inputs change so Submit can enable/disable.
  let actions;
  function rerenderActions() {
    if (!actions) return;
    actions.innerHTML = '';
    fillActions();
    mathifyDom(actions);
  }

  // Stem + input — branch on whether prompt has inline blanks
  if (promptHasBlanks) {
    // For prompts containing both inline {blank} placeholders AND a possible
    // {figure} marker, we split on {figure} first, then render each segment
    // through the prompt-interactive tokenizer.
    const marker = '{figure}';
    const markerIdx = promptStr.indexOf(marker);
    if (markerIdx >= 0 && (figPath || q.figure_description)) {
      const before = promptStr.slice(0, markerIdx);
      const after = promptStr.slice(markerIdx + marker.length);
      if (before.trim()) {
        const stem1 = el('div', { class: 'stem' });
        stem1.appendChild(renderInteractivePrompt(before, st, rerenderActions, disabled, statusForUI));
        panel.appendChild(stem1);
      }
      const fig = renderFigure(null, figPath); // no caption inline
      if (fig) panel.appendChild(fig);
      if (after.trim()) {
        const stem2 = el('div', { class: 'stem' });
        stem2.appendChild(renderInteractivePrompt(after, st, rerenderActions, disabled, statusForUI));
        panel.appendChild(stem2);
      }
    } else {
      // No figure marker — figure (if any) stands above; then the
      // interactive prompt below.
      if (figPath || q.figure_description) {
        const fig = renderFigure(q.figure_description, figPath);
        if (fig) panel.appendChild(fig);
      }
      const stem = el('div', { class: 'stem' });
      stem.appendChild(renderInteractivePrompt(promptStr, st, rerenderActions, disabled, statusForUI));
      panel.appendChild(stem);
    }
  } else {
    // No inline {blank}s — stem + figure intelligently mixed
    panel.appendChild(renderStemWithFigure(promptStr, q.figure_description, figPath));
    // No inline blanks — render the answer input below the stem.
    if (isFractionAns) {
      // Stacked num/den input — answer expected as "a/b"
      if (!Array.isArray(st.fibVals) || st.fibVals.length !== 2) st.fibVals = ['', ''];
      const row = el('div', { class: 'fib-row' });
      row.appendChild(el('span', { style: 'font-size:15px;color:var(--muted)' }, 'Your answer:'));
      row.appendChild(makeStackedFrac({
        topBlank: true, botBlank: true, st, valOffset: 0,
        onChange: rerenderActions, disabled, status: statusForUI,
      }));
      panel.appendChild(row);
    } else {
      // Single inline input
      if (!Array.isArray(st.fibVals) || st.fibVals.length !== 1) st.fibVals = [''];
      const row = el('div', { class: 'fib-row' });
      row.appendChild(el('span', { style: 'font-size:15px;color:var(--muted)' }, 'Your answer:'));
      row.appendChild(makeInlineInput({ st, valOffset: 0, onChange: rerenderActions, disabled, status: statusForUI }));
      panel.appendChild(row);
    }
  }

  const cfBlock = isCF(it);
  const threshold = wrongShownThresholdFor(it);
  function fillActions() {
    if (st.status === 'pending' || st.status === 'wrong') {
      if (!cfBlock) actions.appendChild(makeHintButton(it));
      actions.appendChild(el('span', { class: 'btn-spacer' }));
      const submit = el('button', { class: 'btn primary' }, st.attempts > 0 ? 'Try again' : 'Submit');
      const filled = (st.fibVals || []).every(v => String(v).trim() !== '');
      submit.disabled = !filled;
      submit.addEventListener('click', () => {
        st.attempts += 1;
        const ok = checkFIB(cfg, st.fibVals, isFractionAns);
        if (ok) { st.status = 'correct'; state.xp += 10; SoundEngine.playCorrect(); }
        else if (st.attempts >= threshold) { st.status = 'wrong-shown'; SoundEngine.playIncorrect(); }
        else { st.status = 'wrong'; SoundEngine.playIncorrect(); }
        render();
      });
      actions.appendChild(submit);
    } else {
      actions.appendChild(el('span', { class: 'btn-spacer' }));
      actions.appendChild(el('button', { class: 'btn primary', onclick: nextItem }, 'Next →'));
    }
  }
  actions = el('div', { class: 'actions' });
  fillActions();
  panel.appendChild(actions);

  // Feedback / hints / explanation
  if (st.status === 'correct') {
    panel.appendChild(el('div', { class: 'feedback good' },
      el('span', { class: 'icon' }, '✓'),
      el('span', {}, st.attempts === 1 ? 'Correct!' : `Correct in ${st.attempts} tries.`),
    ));
    if (q.explanation) {
      panel.appendChild(el('div', { class: 'explanation' },
        el('span', { class: 'label' }, 'Explanation'),
        el('span', {}, q.explanation),
      ));
    }
  } else if (st.status === 'wrong') {
    panel.appendChild(makeWrongFeedback(st.attempts, threshold));
  } else if (st.status === 'wrong-shown') {
    panel.appendChild(makeAnswerRevealPanel(formatAnswerForDisplay(cfg), q.explanation));
  }
  if (!cfBlock) panel.appendChild(makeHintsPanel(it));
  return panel;
}

function formatAnswerForDisplay(cfg) {
  if (Array.isArray(cfg.answers)) {
    if (cfg.answers.length === 2) return `\\(\\frac{${cfg.answers[0]}}{${cfg.answers[1]}}\\)`;
    return cfg.answers.join(', ');
  }
  if (cfg.answer != null) {
    const m = String(cfg.answer).match(/^(\d+)\/(\d+)$/);
    if (m) return `\\(\\frac{${m[1]}}{${m[2]}}\\)`;
    return String(cfg.answer);
  }
  return '';
}

// For an MCQ correct answer, strip the leading "(A) " / "(B) " prefix since
// the option itself is already highlighted in green. We just want the value.
function formatMCQAnswerForDisplay(cfg) {
  if (!cfg || !Array.isArray(cfg.options)) return '';
  const opt = cfg.options[cfg.answer] || '';
  return String(opt).replace(/^\([A-E]\)\s*/, '');
}

// Build the "💡 Answer: X" reveal panel used after wrong-shown.
function makeAnswerRevealPanel(answerStr, explanation) {
  const panel = el('div', { class: 'answer-reveal' });
  panel.appendChild(el('div', { class: 'header' },
    el('span', { class: 'lightbulb' }, '💡'),
    el('span', { html: 'Answer: ' + answerStr }),
  ));
  if (explanation) {
    panel.appendChild(el('div', { class: 'body' }, explanation));
  }
  return panel;
}

// "Not quite — one more chance / try again" with an attempts counter shown
// as "(N of M)". We deliberately avoid the "N/M" slash form because the math
// walker would otherwise convert it into a KaTeX stacked fraction — that's
// correct behaviour for real fractions like 1/2 in question text, but wrong
// for a progress counter. The .no-math class is also belt-and-braces so any
// future slash-bearing counter is safe.
function makeWrongFeedback(attempts, threshold) {
  const oneLeft = attempts >= threshold - 1;
  const msg = oneLeft ? 'Not quite — one more chance' : 'Not quite — try again';
  return el('div', { class: 'feedback bad' },
    el('span', { class: 'icon' }, '⊘'),
    el('span', {}, msg),
    el('span', { class: 'counter no-math' }, `(${attempts} of ${threshold})`),
  );
}

// Normalize a single-blank free-text answer so "9/2", "9 / 2", " 9/2 " all
// compare equal, and so "4.5" matches "4.5". Also evaluates simple a/b
// fraction strings to a Number so "9/2" can compare numerically to "4.5".
function _normFibText(s) { return String(s).replace(/\s+/g, '').trim(); }
function _fibNumericValue(s) {
  const t = _normFibText(s);
  if (/^-?\d+(\.\d+)?$/.test(t)) return Number(t);
  const m = t.match(/^(-?\d+)\/(\d+)$/);
  if (m) {
    const d = Number(m[2]); if (d === 0) return null;
    return Number(m[1]) / d;
  }
  return null;
}
function _fibSingleMatches(val, answer) {
  if (_normFibText(val) === _normFibText(answer)) return true;
  const a = _fibNumericValue(val), b = _fibNumericValue(answer);
  return (a !== null && b !== null && a === b);
}
function checkFIB(cfg, vals, isFractionAns) {
  // Two-value answer (e.g. [3, 4] for a fraction prompt with two blanks)
  if (Array.isArray(cfg.answers)) {
    if (!vals || vals.length < cfg.answers.length) return false;
    const exact = cfg.answers.every((a, i) => String(vals[i]).trim() === String(a).trim());
    if (exact) return true;
    // Opt-in: accept any equivalent fraction for a two-blank fraction answer
    // (e.g. a multiplication product where 6/12, 3/6 and 1/2 are all correct).
    // Only when the author sets accept_equivalent — equivalence/simplify-form
    // questions must NOT set it.
    if (cfg.accept_equivalent && cfg.answers.length === 2) {
      const n = Number(vals[0]), d = Number(vals[1]);
      const an = Number(cfg.answers[0]), ad = Number(cfg.answers[1]);
      if (Number.isInteger(n) && Number.isInteger(d) && n >= 0 && d > 0) return n * ad === d * an;
    }
    return false;
  }
  if (cfg.answer == null) return false;
  // Build a list of accepted single-blank forms: the canonical answer plus
  // any author-supplied alternates in cfg.accept (e.g. ["9/2"] for "4.5").
  const accepts = [cfg.answer].concat(Array.isArray(cfg.accept) ? cfg.accept : []);
  // Fraction answer stored as "a/b"; vals can be [num, den] (stacked input)
  // OR ["a/b"] (single input).
  if (isFractionAns) {
    if (vals.length === 2) {
      const parsed = parseFractionAnswer(String(cfg.answer));
      if (!parsed) return false;
      if (String(vals[0]).trim() === parsed[0] && String(vals[1]).trim() === parsed[1]) return true;
      if (cfg.accept_equivalent) {
        const n = Number(vals[0]), d = Number(vals[1]), an = Number(parsed[0]), ad = Number(parsed[1]);
        if (Number.isInteger(n) && Number.isInteger(d) && n >= 0 && d > 0) return n * ad === d * an;
      }
      return false;
    }
    return accepts.some(a => _fibSingleMatches(vals[0], a));
  }
  // Plain single-value answer
  return accepts.some(a => _fibSingleMatches(vals[0], a));
}

// Hint button + hints panel
function makeHintButton(it) {
  const q = it.data;
  const hints = q.hints || (q.hint ? [q.hint] : []);
  const st = getSt(it.id);
  if (!hints.length) return el('span');
  const btn = el('button', { class: 'btn ghost' },
    `💡 Hint ${st.hintsShown} / ${hints.length}`
  );
  btn.disabled = st.hintsShown >= hints.length;
  btn.addEventListener('click', () => {
    st.hintsShown = Math.min(st.hintsShown + 1, hints.length);
    SoundEngine.playHintReveal();
    render();
  });
  return btn;
}
function makeHintsPanel(it) {
  const q = it.data;
  const hints = q.hints || (q.hint ? [q.hint] : []);
  const st = getSt(it.id);
  if (!hints.length || st.hintsShown === 0) return el('span');
  const box = el('div', { class: 'hints' });
  const list = el('div', { class: 'hint-list' });
  for (let i = 0; i < st.hintsShown; i++) {
    list.appendChild(el('div', { class: 'hint' },
      el('span', { class: 'label' }, `Hint ${i + 1}:`),
      el('span', {}, hints[i]),
    ));
  }
  box.appendChild(list);
  return box;
}

// IL step renderer — explain / applet / apply / predict / reveal
function renderILStep(it) {
  const step = it.data;
  const st = getSt(it.id);
  const panel = el('div', { class: 'panel' });
  panel.appendChild(renderBreadcrumb(it));
  panel.appendChild(el('div', { class: 'item-title' },
    `Step ${step.step}${step.section ? ' · Section ' + step.section : ''}${step.cpa_beat ? ' · ' + step.cpa_beat : ''}`,
  ));
  if (step.title) panel.appendChild(el('div', { class: 'stem', style: 'font-weight:600;font-size:18px' }, step.title));
  panel.appendChild(el('div', { class: 'item-counter' },
    `Block ${it.blockIdx + 1} · Step ${it.posInBlock} of ${it.totalInBlock}`));

  // Stem text first — describes what's about to be shown
  if (step.text) panel.appendChild(el('div', { class: 'stem' }, step.text));

  // Figure or applet
  let appletWidget = null;
  const appletCtl = { onSolved: null };
  if (step.type === 'applet' && step.applet_type) {
    // Applet validates against its OWN state (predict + Check inside the
    // applet). When its check succeeds, it calls back via appletCtl.onSolved,
    // which is wired up later — once panel/nextBtn exist — so it can update
    // them in place rather than re-render the whole step (re-render would
    // destroy the applet's "just solved" state).
    const onAppletSolved = () => { if (appletCtl.onSolved) appletCtl.onSolved(); };
    appletWidget = renderApplet(step, onAppletSolved);
    if (appletWidget) panel.appendChild(appletWidget);
    else if (step.figure || step.figure_description) {
      const fig = renderFigure(step.figure_description, step.figure);
      if (fig) panel.appendChild(fig);
    }
  } else if (step.figure || step.figure_description) {
    const fig = renderFigure(step.figure_description, step.figure);
    if (fig) panel.appendChild(fig);
  }
  if (step.insight) panel.appendChild(el('div', { class: 'insight' },
    el('span', { class: 'icon' }, '💡'),
    el('span', {}, step.insight),
  ));

  // Rule table
  if (step.rule_table && step.rule_table.length) {
    const t = el('table', { class: 'rule' });
    const head = el('tr');
    Object.keys(step.rule_table[0]).forEach(k => head.appendChild(el('th', {}, prettifyKey(k))));
    t.appendChild(head);
    step.rule_table.forEach(row => {
      const tr = el('tr');
      Object.values(row).forEach(v => tr.appendChild(el('td', {}, v)));
      t.appendChild(tr);
    });
    panel.appendChild(t);
  }
  if (step.summary_table && step.summary_table.length) {
    const t = el('table', { class: 'rule' });
    const head = el('tr');
    Object.keys(step.summary_table[0]).forEach(k => head.appendChild(el('th', {}, prettifyKey(k))));
    t.appendChild(head);
    step.summary_table.forEach(row => {
      const tr = el('tr');
      Object.values(row).forEach(v => tr.appendChild(el('td', {}, v)));
      t.appendChild(tr);
    });
    panel.appendChild(t);
  }

  // questions (build-up FIBs) / discovery_question / action (single MCQ/applet) /
  // curiosity_question — render in this order. Questions come before action so that
  // a predict step can build up sub-Q derivations before the MCQ predict prompt.
  const actionItems = [];
  if (step.questions) {
    step.questions.forEach((q, i) => actionItems.push({ key: 'sub-' + i, q }));
  }
  if (step.discovery_question) actionItems.push({ key: 'discovery', q: step.discovery_question });
  if (step.action) actionItems.push({ key: 'action', q: step.action });
  if (step.curiosity_question) actionItems.push({ key: 'curiosity', q: step.curiosity_question });

  if (st.subAnswers == null) st.subAnswers = {};
  let allCorrect = actionItems.length > 0;
  // Progressive disclosure: render questions one at a time. The next question
  // appears only after the current one is answered correctly (or locked via
  // wrong-shown after 3 attempts). Single-question steps (action / discovery /
  // curiosity) are unaffected since the loop renders exactly one item anyway.
  for (const { key, q } of actionItems) {
    const subSt = st.subAnswers[key] || { vals: [], status: 'pending', hintsShown: 0 };
    st.subAnswers[key] = subSt;
    panel.appendChild(renderILAction(it, key, q, subSt, step));
    if (subSt.status !== 'correct') allCorrect = false;
    if (subSt.status !== 'correct' && subSt.status !== 'wrong-shown') break;
  }

  // Step completion: combine FIB-correctness and (if this is an applet step)
  // the applet's own internal check (it validates against its current state
  // and calls back to set st.__appletSolved). Auto-advance only when a gate
  // exists (FIB or applet); pure text-only steps complete on render but advance
  // manually via Next.
  const hasApplet = step.type === 'applet' && step.applet_type;
  const fibGateMet = actionItems.length === 0 || allCorrect;
  const appletGateMet = !hasApplet || st.__appletSolved === true;
  const stepDone = fibGateMet && appletGateMet;
  st.__ilReadyToAdvance = stepDone && (hasApplet || actionItems.length > 0);
  if (stepDone) {
    if (step.discovery_message) panel.appendChild(el('div', { class: 'insight' },
      el('span', { class: 'icon' }, '🔎'),
      el('span', {}, step.discovery_message),
    ));
    if (step.on_all_correct) panel.appendChild(el('div', { class: 'insight' },
      el('span', { class: 'icon' }, '🎯'),
      el('span', {}, step.on_all_correct),
    ));
    if (step.curiosity_question && step.curiosity_question.reveal_message
        && (st.subAnswers.curiosity || {}).status === 'correct') {
      panel.appendChild(el('div', { class: 'insight' },
        el('span', { class: 'icon' }, '→'),
        el('span', {}, step.curiosity_question.reveal_message),
      ));
    }
    if (st.status !== 'completed') {
      st.status = 'completed';
      state.xp += 5;
    }
  }

  // Nav actions
  const actions = el('div', { class: 'actions' });
  actions.appendChild(el('span', { class: 'btn-spacer' }));
  const nextBtn = el('button', { class: 'btn primary' }, 'Next →');
  if (!stepDone && (actionItems.length > 0 || hasApplet)) {
    nextBtn.disabled = true;
    nextBtn.textContent = hasApplet && actionItems.length === 0
      ? 'Solve the applet to continue'
      : 'Answer the action to continue';
  }
  // predict step has proceed_regardless
  if (step.action && step.action.proceed_regardless) {
    nextBtn.disabled = false;
    nextBtn.textContent = 'Next →';
  }
  nextBtn.addEventListener('click', nextItem);
  actions.appendChild(nextBtn);
  panel.appendChild(actions);

  // Wire the in-place applet-solved handler now that panel/nextBtn exist.
  // Patches the panel without re-rendering, so the applet stays on its
  // last-round green state and the student sees a clean progression to the
  // next step.
  if (appletWidget) {
    appletCtl.onSolved = () => {
      if (st.__appletSolved) return;
      st.__appletSolved = true;
      st.__ilReadyToAdvance = true;
      if (st.status !== 'completed') { st.status = 'completed'; state.xp += 5; }
      // Append discovery_message / on_all_correct just below the applet.
      const after = actions; // insert before the nav row
      if (step.discovery_message) {
        const d = el('div', { class: 'insight' },
          el('span', { class: 'icon' }, '🔎'),
          el('span', {}, step.discovery_message),
        );
        panel.insertBefore(d, after);
      }
      if (step.on_all_correct) {
        const o = el('div', { class: 'insight' },
          el('span', { class: 'icon' }, '🎯'),
          el('span', {}, step.on_all_correct),
        );
        panel.insertBefore(o, after);
      }
      mathifyDom(panel);
      // Flip the gate-locked button into a real Next.
      nextBtn.disabled = false;
      nextBtn.textContent = 'Next →';
      // Schedule the inter-step auto-advance manually (the normal hook only
      // fires from render(), but we deliberately skipped that re-render).
      maybeScheduleAutoAdvance(it);
    };
  }

  return panel;
}

// Render an action inside an IL step. q has prompt, config, hint
function renderILAction(it, key, q, subSt, step) {
  const wrap = el('div', { class: 'panel', style: 'background:var(--panel-soft);box-shadow:none;padding:14px 16px;margin:10px 0' });

  // Optional sub-heading above the prompt — used to bridge between question
  // arcs inside a multi-question step (e.g. "Try it with a class of students").
  if (q.lead_in) {
    wrap.appendChild(el('div', {
      style: 'font-weight:600;font-size:14px;color:var(--accent);margin:0 0 10px;padding-bottom:6px;border-bottom:1px solid var(--rule)'
    }, q.lead_in));
  }

  const cfg = q.config || {};
  const isMCQ = Array.isArray(cfg.options);
  const promptStr = q.prompt || '';
  const promptHasBlanks = /\{(?:blank\d*|\d+)\}/.test(promptStr);
  const statusForUI =
    subSt.status === 'correct' ? 'correct' :
    (subSt.status === 'wrong' || subSt.status === 'wrong-shown') ? 'wrong' : '';
  const disabled = (subSt.status === 'correct' || subSt.status === 'wrong-shown');

  function complete(ok, vals) {
    subSt.attempts = (subSt.attempts || 0) + 1;
    if (ok) { subSt.status = 'correct'; state.xp += 5; SoundEngine.playCorrect(); }
    else if (subSt.attempts >= 3) { subSt.status = 'wrong-shown'; SoundEngine.playIncorrect(); }
    else { subSt.status = 'wrong'; SoundEngine.playIncorrect(); }
    if (vals !== undefined) subSt.vals = vals;
    render();
  }

  // Migrate older subSt.vals (legacy MCQ stored as [index]) into st.fibVals
  if (!Array.isArray(subSt.fibVals)) subSt.fibVals = subSt.vals && Array.isArray(subSt.vals) ? subSt.vals.slice() : [];

  if (isMCQ) {
    // Show the prompt text as a single line; MCQ options below.
    if (promptStr) wrap.appendChild(el('div', { class: 'stem', style: 'margin:0 0 10px;font-size:15px' }, promptStr));
    const correctIdx = cfg.answer;
    // An option is either a plain string OR an object { image, label }. If any
    // option has an image, render the whole group as an image grid.
    const hasImages = cfg.options.some(o => o && typeof o === 'object' && o.image);
    const box = el('div', { class: 'mcq-options' + (hasImages ? ' is-image-grid' : '') });
    cfg.options.forEach((opt, i) => {
      const isImg = opt && typeof opt === 'object' && opt.image;
      const btn = el('button', {
        class: 'mcq-option' + (isImg ? ' is-image' : '')
          + (subSt.vals && subSt.vals[0] === i ? ' selected' : '')
          + (subSt.status === 'correct' && i === correctIdx ? ' correct' : '')
          + ((subSt.status === 'wrong-shown') && i === correctIdx ? ' correct' : '')
          + (subSt.status === 'wrong' && subSt.vals && subSt.vals[0] === i ? ' wrong' : '')
          + (disabled ? ' disabled' : '')
      },
        el('span', { class: 'marker' }, String.fromCharCode(65 + i)),
      );
      if (isImg) {
        const img = el('img', { src: resolveFigPath(opt.image), alt: opt.label || `Option ${String.fromCharCode(65 + i)}` });
        img.addEventListener('error', () => { img.style.display = 'none'; });
        btn.appendChild(img);
        if (opt.label) btn.appendChild(el('span', { style: 'font-size:13px;color:var(--muted);margin-top:4px' }, opt.label));
      } else {
        btn.appendChild(el('span', {}, String(opt).replace(/^\([A-E]\)\s*/, '')));
      }
      if (!disabled) btn.addEventListener('click', () => complete(i === correctIdx, [i]));
      box.appendChild(btn);
    });
    wrap.appendChild(box);
  } else if (promptHasBlanks) {
    // Fill-in-blank with inline placeholders — render prompt with inputs.
    // We piggy-back st.fibVals onto subSt by aliasing the field name so
    // renderInteractivePrompt / makeStackedFrac can stay generic.
    const subProxy = { fibVals: subSt.fibVals };
    const stem = el('div', { class: 'stem', style: 'margin:0 0 10px;font-size:15px;line-height:1.9' });
    let actionsBox; // forward declared
    function onInputChange() {
      subSt.fibVals = subProxy.fibVals;
      if (actionsBox) { actionsBox.innerHTML = ''; fillSubmit(); mathifyDom(actionsBox); }
    }
    stem.appendChild(renderInteractivePrompt(promptStr, subProxy, onInputChange, disabled, statusForUI));
    wrap.appendChild(stem);
    subSt.fibVals = subProxy.fibVals;
    actionsBox = el('div', { class: 'actions' });
    function fillSubmit() {
      if (subSt.status !== 'pending' && subSt.status !== 'wrong') return;
      const submit = el('button', { class: 'btn primary' }, subSt.attempts > 0 ? 'Try again' : 'Check');
      const need = countBlanks(tokenizePrompt(promptStr));
      const filled = subSt.fibVals && subSt.fibVals.length === need && subSt.fibVals.every(v => String(v).trim() !== '');
      submit.disabled = !filled;
      submit.addEventListener('click', () => {
        // Validate via the shared checkFIB so cfg.accept (alternate forms)
        // and stacked-fraction equivalence work consistently with renderFIB.
        const vals = subSt.fibVals.map(v => String(v).trim());
        const isFracAns = Array.isArray(cfg.answers) ||
          (typeof cfg.answer === 'string' && /^\d+\/\d+$/.test(cfg.answer));
        complete(checkFIB(cfg, vals, isFracAns));
      });
      actionsBox.appendChild(submit);
    }
    fillSubmit();
    wrap.appendChild(actionsBox);
  } else {
    // Free-form FIB (no inline placeholders) — render prompt as stem,
    // then a single answer input below.
    if (promptStr) wrap.appendChild(el('div', { class: 'stem', style: 'margin:0 0 10px;font-size:15px' }, promptStr));
    if (!Array.isArray(subSt.fibVals) || subSt.fibVals.length !== 1) subSt.fibVals = [''];
    const subProxy = { fibVals: subSt.fibVals };
    const row = el('div', { class: 'fib-row' });
    row.appendChild(el('span', { style: 'font-size:14px;color:var(--muted)' }, 'Answer:'));
    let actionsBox;
    function onInputChange() {
      subSt.fibVals = subProxy.fibVals;
      if (actionsBox) { actionsBox.innerHTML = ''; fillSubmit(); }
    }
    row.appendChild(makeInlineInput({ st: subProxy, valOffset: 0, onChange: onInputChange, disabled, status: statusForUI }));
    wrap.appendChild(row);
    actionsBox = el('div', { class: 'actions' });
    function fillSubmit() {
      if (subSt.status !== 'pending' && subSt.status !== 'wrong') return;
      const submit = el('button', { class: 'btn primary' }, subSt.attempts > 0 ? 'Try again' : 'Check');
      submit.disabled = !String(subSt.fibVals[0] || '').trim();
      submit.addEventListener('click', () => {
        const vals = [String(subSt.fibVals[0]).trim()];
        const isFracAns = (typeof cfg.answer === 'string' && /^\d+\/\d+$/.test(cfg.answer));
        complete(checkFIB(cfg, vals, isFracAns));
      });
      actionsBox.appendChild(submit);
    }
    fillSubmit();
    wrap.appendChild(actionsBox);
  }

  // Inline feedback (matches the sample player's "💡 Answer: X" pattern)
  const ilThreshold = 3; // IL actions still get 3 attempts
  if (subSt.status === 'correct') {
    wrap.appendChild(el('div', { class: 'feedback good' },
      el('span', { class: 'icon' }, '✓'),
      el('span', {}, 'Correct.'),
    ));
  } else if (subSt.status === 'wrong') {
    wrap.appendChild(makeWrongFeedback(subSt.attempts, ilThreshold));
  } else if (subSt.status === 'wrong-shown') {
    let correctStr;
    if (isMCQ) correctStr = formatMCQAnswerForDisplay(cfg);
    else if (Array.isArray(cfg.answers) && cfg.answers.length === 2)
      correctStr = `\\(\\frac{${cfg.answers[0]}}{${cfg.answers[1]}}\\)`;
    else if (Array.isArray(cfg.answers)) correctStr = cfg.answers.join(', ');
    else {
      // Single value — render as KaTeX fraction if it's "a/b", else plain.
      const m = String(cfg.answer).match(/^(\d+)\/(\d+)$/);
      correctStr = m ? `\\(\\frac{${m[1]}}{${m[2]}}\\)` : String(cfg.answer);
    }
    wrap.appendChild(makeAnswerRevealPanel(correctStr, null));
  }
  // Hint
  if (q.hint && subSt.status !== 'correct') {
    const showHint = el('button', { class: 'btn ghost', style: 'margin-top:8px' },
      subSt.hintsShown >= 1 ? `💡 Hint shown` : `💡 Show hint`
    );
    if (subSt.hintsShown >= 1) showHint.disabled = true;
    showHint.addEventListener('click', () => { subSt.hintsShown = 1; render(); });
    wrap.appendChild(showHint);
    if (subSt.hintsShown >= 1) {
      wrap.appendChild(el('div', { class: 'hint', style: 'margin-top:8px' },
        el('span', { class: 'label' }, 'Hint:'),
        el('span', {}, q.hint),
      ));
    }
  }
  // Action: on_correct / on_wrong messages for predict steps
  if (q.on_correct && subSt.status === 'correct') {
    wrap.appendChild(el('div', { class: 'insight', style: 'margin-top:8px' },
      el('span', { class: 'icon' }, '✓'),
      el('span', {}, q.on_correct),
    ));
  }
  if (q.on_wrong && (subSt.status === 'wrong' || subSt.status === 'wrong-shown')) {
    wrap.appendChild(el('div', { class: 'insight', style: 'margin-top:8px;background:var(--bad-soft);border-left-color:var(--bad)' },
      el('span', { class: 'icon' }, '↻'),
      el('span', {}, q.on_wrong),
    ));
  }
  return wrap;
}

// Worked example renderer — show main MCQ, scaffold expands on wrong
function renderWE(it) {
  const we = it.data;
  const st = getSt(it.id);
  const panel = el('div', { class: 'panel' });
  panel.appendChild(renderBreadcrumb(it));
  panel.appendChild(el('div', { class: 'item-title' }, `Worked Example ${it.posInBlock}`));
  const weSourceLabel = we.pyq
    ? `PYQ ${we.pyq.year} ${we.pyq.question}`
    : (we.calibration_anchor
        ? `Original (calibrated to MK ${we.calibration_anchor.year} ${we.calibration_anchor.question})`
        : 'Original');
  panel.appendChild(el('div', { class: 'item-counter' },
    `Block ${it.blockIdx + 1} · WE ${it.posInBlock} of ${it.totalInBlock} · ${weSourceLabel}`));

  // Stem + figure together — author controls placement with a {figure} marker
  // (same as renderMCQ). Without a marker the figure renders above the stem.
  const weFigPath = we.figure || (we.figures && we.figures[0]);
  panel.appendChild(renderStemWithFigure(we.question_text || '', we.figure_description, weFigPath));

  // Main MCQ
  const correctIdx = we.answer_index;
  const optionsBox = el('div', { class: 'mcq-options' });
  (we.options || []).forEach((opt, i) => {
    const btn = el('button', {
      class: 'mcq-option' + (st.answer === i ? ' selected' : '')
        + (st.status === 'correct' && i === correctIdx ? ' correct' : '')
        + (st.status === 'wrong-shown' && i === correctIdx ? ' correct' : '')
        + (st.status === 'wrong' && st.answer === i ? ' wrong' : '')
        + (st.status === 'correct' || st.status === 'wrong-shown' ? ' disabled' : '')
    },
      el('span', { class: 'marker' }, String.fromCharCode(65 + i)),
      el('span', {}, String(opt).replace(/^\([A-E]\)\s*/, '')),
    );
    if (st.status !== 'correct' && st.status !== 'wrong-shown') {
      btn.addEventListener('click', () => { st.answer = i; render(); });
    }
    optionsBox.appendChild(btn);
  });
  panel.appendChild(optionsBox);

  const actions = el('div', { class: 'actions' });
  if (st.status === 'pending' || st.status === 'wrong') {
    actions.appendChild(el('span', { class: 'btn-spacer' }));
    const submit = el('button', { class: 'btn primary' }, st.attempts > 0 ? 'Try again' : 'Submit');
    submit.disabled = st.answer == null;
    submit.addEventListener('click', () => {
      st.attempts += 1;
      if (st.answer === correctIdx) {
        st.status = 'correct'; state.xp += 15;
      } else if (st.attempts >= 2) {
        st.status = 'wrong-shown';
        st.scaffoldOpen = true;
      } else {
        st.status = 'wrong';
        st.scaffoldOpen = true; // show scaffold on first wrong
      }
      render();
    });
    actions.appendChild(submit);
  } else {
    actions.appendChild(el('span', { class: 'btn-spacer' }));
    actions.appendChild(el('button', { class: 'btn primary', onclick: nextItem }, 'Next →'));
  }
  panel.appendChild(actions);

  if (st.status === 'correct') {
    panel.appendChild(el('div', { class: 'feedback good' },
      el('span', { class: 'icon' }, '✓'),
      el('span', {}, 'Correct on the first try! No scaffold needed.'),
    ));
  } else if (st.status === 'wrong') {
    panel.appendChild(el('div', { class: 'feedback bad' },
      el('span', { class: 'icon' }, '✗'),
      el('span', {}, 'Not quite. The scaffold below breaks the problem into smaller steps — walk through them, then try again.'),
    ));
  } else if (st.status === 'wrong-shown') {
    panel.appendChild(el('div', { class: 'feedback info' },
      el('span', { class: 'icon' }, 'ℹ'),
      el('span', {}, 'Answer revealed. Review the scaffold below.'),
    ));
  }

  // Scaffold — show when scaffoldOpen
  if (st.scaffoldOpen && we.steps && we.steps.length) {
    const scaf = el('div', { class: 'scaffold' });
    scaf.appendChild(el('div', { class: 'scaffold-header' }, `Scaffold — ${we.steps.length} mini-steps`));
    we.steps.forEach((s, si) => {
      const stepBox = el('div', { class: 'scaffold-step' });
      stepBox.appendChild(el('div', { class: 'step-num' }, `Step ${s.step || (si + 1)} · ${s.note || ''}`));
      (s.segments || []).forEach((seg, segi) => {
        if (seg.figure_ref) {
          const fig = renderFigure(seg.figure_description || null, seg.figure_ref);
          if (fig) stepBox.appendChild(fig);
        }
        if (seg.narration) stepBox.appendChild(el('div', { style: 'margin:4px 0' }, seg.narration));
        if (seg.narration_items) {
          const ul = el('ul');
          seg.narration_items.forEach(t => ul.appendChild(el('li', {}, t)));
          stepBox.appendChild(ul);
        }
        if (seg.checkpoint) {
          // Render checkpoint as an inline sub-action with hint + reveal
          const subKey = `we-${si}-${segi}`;
          if (!st.subAnswers) st.subAnswers = {};
          const subSt = st.subAnswers[subKey] || { status: 'pending', vals: [] };
          st.subAnswers[subKey] = subSt;
          stepBox.appendChild(renderILAction(it, subKey, seg.checkpoint, subSt, s));
          if (subSt.status === 'correct' && seg.checkpoint.explanation) {
            stepBox.appendChild(el('div', { class: 'explanation' },
              el('span', { class: 'label' }, 'Why'),
              el('span', {}, seg.checkpoint.explanation),
            ));
          }
        }
      });
      scaf.appendChild(stepBox);
    });
    panel.appendChild(scaf);
  }

  return panel;
}

// Mastery Check question — same as MCQ but tracks mastery state
function renderMCQuestion(it) {
  return renderMCQ(it, { mastery: true });
}

// Mastery summary
function renderMCSummary(it) {
  // Walk back to compute MC score from itemState
  const mcItems = state.items.filter(x => x.kind === 'mc-question' && x.blockIdx === it.blockIdx);
  const correctCount = mcItems.filter(x => (state.itemState[x.id] || {}).status === 'correct').length;
  const pass = correctCount >= it.mcThreshold;

  actions.appendChild(el('span', { class: 'btn-spacer' }));
  actions.appendChild(el('button', { class: 'btn primary', onclick: nextItem }, 'Got it — Next →'));
  panel.appendChild(actions);
  if (st.status !== 'completed') { st.status = 'completed'; state.xp += 5; }
  return panel;
