<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 642 352" width="642" height="352" style="font-family:-apple-system,Segoe UI,sans-serif" preserveAspectRatio="xMidYMid meet"><rect width="642" height="352" fill="#FFFFFF"/><rect x="16" y="16" width="610" height="64" fill="#EBBDEC" stroke="#850F85" stroke-width="1.5" rx="0" ry="0"/><text x="131.0" y="53.0" font-size="15" fill="#2B2B2B" text-anchor="middle" font-weight="700" font-family='KaTeX_Main, "Untitled Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>Operation</text><text x="436.0" y="53.0" font-size="15" fill="#2B2B2B" text-anchor="middle" font-weight="700" font-family='KaTeX_Main, "Untitled Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>Rule</text><rect x="16" y="80" width="610" height="64" fill="#FFFFFF" stroke="#850F85" stroke-width="1" rx="0" ry="0"/><text x="131.0" y="117.0" font-size="14" fill="#2B2B2B" text-anchor="middle" font-weight="600" font-family='KaTeX_Main, "Untitled Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>Read a decimal's value</text><text x="436.0" y="117.0" font-size="13" fill="#2B2B2B" text-anchor="middle" font-weight="500" font-family='KaTeX_Main, "Untitled Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>Each column to the right is 10× smaller</text><rect x="16" y="144" width="610" height="64" fill="#FFFFFF" stroke="#850F85" stroke-width="1" rx="0" ry="0"/><text x="131.0" y="181.0" font-size="14" fill="#2B2B2B" text-anchor="middle" font-weight="600" font-family='KaTeX_Main, "Untitled Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>Decimal ↔ fraction</text><text x="436.0" y="181.0" font-size="13" fill="#2B2B2B" text-anchor="middle" font-weight="500" font-family='KaTeX_Main, "Untitled Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>Digits after the point go over 10, 100, 1000</text><rect x="16" y="208" width="610" height="64" fill="#FFFFFF" stroke="#850F85" stroke-width="1" rx="0" ry="0"/><text x="131.0" y="245.0" font-size="14" fill="#2B2B2B" text-anchor="middle" font-weight="600" font-family='KaTeX_Main, "Untitled Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>Multiply or divide by 10</text><text x="436.0" y="245.0" font-size="13" fill="#2B2B2B" text-anchor="middle" font-weight="500" font-family='KaTeX_Main, "Untitled Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>Shift the decimal point: ÷ left, × right</text><rect x="16" y="272" width="610" height="64" fill="#FFFFFF" stroke="#850F85" stroke-width="1" rx="0" ry="0"/><text x="131.0" y="309.0" font-size="14" fill="#2B2B2B" text-anchor="middle" font-weight="600" font-family='KaTeX_Main, "Untitled Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>Multiply or divide decimals</text><text x="436.0" y="309.0" font-size="13" fill="#2B2B2B" text-anchor="middle" font-weight="500" font-family='KaTeX_Main, "Untitled Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>Switch to fractions, then × or ÷</text></svg>