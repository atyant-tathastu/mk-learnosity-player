<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 145" width="600" height="145" font-family='"Untitled Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>

  <!-- Panel A: Regular hexagon, 2 of 6 triangular sectors shaded -->
  <g>
    <polygon points="60,60 60,20 94.64,40"      fill="#8DD5F1" stroke="#0A80D5" stroke-width="1.5"/>
    <polygon points="60,60 94.64,40 94.64,80"   fill="#8DD5F1" stroke="#0A80D5" stroke-width="1.5"/>
    <polygon points="60,60 94.64,80 60,100"     fill="#FFFFFF" stroke="#0A80D5" stroke-width="1.5"/>
    <polygon points="60,60 60,100 25.36,80"     fill="#FFFFFF" stroke="#0A80D5" stroke-width="1.5"/>
    <polygon points="60,60 25.36,80 25.36,40"   fill="#FFFFFF" stroke="#0A80D5" stroke-width="1.5"/>
    <polygon points="60,60 25.36,40 60,20"      fill="#FFFFFF" stroke="#0A80D5" stroke-width="1.5"/>
    <polygon points="60,20 94.64,40 94.64,80 60,100 25.36,80 25.36,40" fill="none" stroke="#0A80D5" stroke-width="2"/>
    <text x="60" y="130" text-anchor="middle" font-size="14" fill="#0A80D5" font-weight="bold">A</text>
  </g>

  <!-- Panel B: Circle, 3 of 4 quadrants shaded (top-right, top-left, bottom-right) -->
  <g>
    <path d="M 180,60 L 180,20 A 40,40 0 0,1 220,60 Z" fill="#8DD5F1" stroke="#0A80D5" stroke-width="1.5"/>
    <path d="M 180,60 L 140,60 A 40,40 0 0,1 180,20 Z" fill="#8DD5F1" stroke="#0A80D5" stroke-width="1.5"/>
    <path d="M 180,60 L 180,100 A 40,40 0 0,1 140,60 Z" fill="#FFFFFF" stroke="#0A80D5" stroke-width="1.5"/>
    <path d="M 180,60 L 220,60 A 40,40 0 0,1 180,100 Z" fill="#8DD5F1" stroke="#0A80D5" stroke-width="1.5"/>
    <circle cx="180" cy="60" r="40" fill="none" stroke="#0A80D5" stroke-width="2"/>
    <text x="180" y="130" text-anchor="middle" font-size="14" fill="#0A80D5" font-weight="bold">B</text>
  </g>

  <!-- Panel C: Isosceles triangle, left half shaded (median from apex to base midpoint) -->
  <g>
    <polygon points="300,20 260,100 300,100" fill="#8DD5F1" stroke="#0A80D5" stroke-width="1.5"/>
    <polygon points="300,20 300,100 340,100" fill="#FFFFFF" stroke="#0A80D5" stroke-width="1.5"/>
    <polygon points="300,20 340,100 260,100" fill="none" stroke="#0A80D5" stroke-width="2"/>
    <text x="300" y="130" text-anchor="middle" font-size="14" fill="#0A80D5" font-weight="bold">C</text>
  </g>

  <!-- Panel D: Square 2x2 grid, top-left small square shaded -->
  <g>
    <rect x="380" y="20" width="40" height="40" fill="#8DD5F1" stroke="#0A80D5" stroke-width="1.5"/>
    <rect x="420" y="20" width="40" height="40" fill="#FFFFFF" stroke="#0A80D5" stroke-width="1.5"/>
    <rect x="380" y="60" width="40" height="40" fill="#FFFFFF" stroke="#0A80D5" stroke-width="1.5"/>
    <rect x="420" y="60" width="40" height="40" fill="#FFFFFF" stroke="#0A80D5" stroke-width="1.5"/>
    <rect x="380" y="20" width="80" height="80" fill="none" stroke="#0A80D5" stroke-width="2"/>
    <text x="420" y="130" text-anchor="middle" font-size="14" fill="#0A80D5" font-weight="bold">D</text>
  </g>

  <!-- Panel E: Regular pentagon, 2 of 5 triangular sectors shaded (adjacent to top vertex) -->
  <g>
    <polygon points="540,60 540,20 578.04,47.64"          fill="#8DD5F1" stroke="#0A80D5" stroke-width="1.5"/>
    <polygon points="540,60 578.04,47.64 563.51,92.36"    fill="#FFFFFF" stroke="#0A80D5" stroke-width="1.5"/>
    <polygon points="540,60 563.51,92.36 516.49,92.36"    fill="#FFFFFF" stroke="#0A80D5" stroke-width="1.5"/>
    <polygon points="540,60 516.49,92.36 501.96,47.64"    fill="#FFFFFF" stroke="#0A80D5" stroke-width="1.5"/>
    <polygon points="540,60 501.96,47.64 540,20"          fill="#8DD5F1" stroke="#0A80D5" stroke-width="1.5"/>
    <polygon points="540,20 578.04,47.64 563.51,92.36 516.49,92.36 501.96,47.64" fill="none" stroke="#0A80D5" stroke-width="2"/>
    <text x="540" y="130" text-anchor="middle" font-size="14" fill="#0A80D5" font-weight="bold">E</text>
  </g>
</svg>
