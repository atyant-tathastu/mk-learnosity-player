<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" width="480" height="240" font-family='"Untitled Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>

  <!-- LEFT PIZZA: cut into 4 quarters, no shading -->
  <g>
    <path d="M 120,120 L 120,30 A 90,90 0 0,1 210,120 Z" fill="#FFFFFF" stroke="#0A80D5" stroke-width="2"/>
    <path d="M 120,120 L 210,120 A 90,90 0 0,1 120,210 Z" fill="#FFFFFF" stroke="#0A80D5" stroke-width="2"/>
    <path d="M 120,120 L 120,210 A 90,90 0 0,1 30,120 Z"  fill="#FFFFFF" stroke="#0A80D5" stroke-width="2"/>
    <path d="M 120,120 L 30,120 A 90,90 0 0,1 120,30 Z"   fill="#FFFFFF" stroke="#0A80D5" stroke-width="2"/>
    <circle cx="120" cy="120" r="90" fill="none" stroke="#0A80D5" stroke-width="2"/>
  </g>

  <!-- ARROW between pizzas -->
  <path d="M 230,120 L 250,120 M 245,114 L 250,120 L 245,126" fill="none" stroke="#5A6B7C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- RIGHT PIZZA: 12 slices, 1 shaded -->
  <g>
    <path d="M 360,120 L 360,30 A 90,90 0 0,1 405,42.06 Z"       fill="#8DD5F1" stroke="#0A80D5" stroke-width="1.5"/>
    <path d="M 360,120 L 405,42.06 A 90,90 0 0,1 437.94,75 Z"    fill="#FFFFFF" stroke="#0A80D5" stroke-width="1.5"/>
    <path d="M 360,120 L 437.94,75 A 90,90 0 0,1 450,120 Z"      fill="#FFFFFF" stroke="#0A80D5" stroke-width="1.5"/>
    <path d="M 360,120 L 450,120 A 90,90 0 0,1 437.94,165 Z"     fill="#FFFFFF" stroke="#0A80D5" stroke-width="1.5"/>
    <path d="M 360,120 L 437.94,165 A 90,90 0 0,1 405,197.94 Z"  fill="#FFFFFF" stroke="#0A80D5" stroke-width="1.5"/>
    <path d="M 360,120 L 405,197.94 A 90,90 0 0,1 360,210 Z"     fill="#FFFFFF" stroke="#0A80D5" stroke-width="1.5"/>
    <path d="M 360,120 L 360,210 A 90,90 0 0,1 315,197.94 Z"     fill="#FFFFFF" stroke="#0A80D5" stroke-width="1.5"/>
    <path d="M 360,120 L 315,197.94 A 90,90 0 0,1 282.06,165 Z"  fill="#FFFFFF" stroke="#0A80D5" stroke-width="1.5"/>
    <path d="M 360,120 L 282.06,165 A 90,90 0 0,1 270,120 Z"     fill="#FFFFFF" stroke="#0A80D5" stroke-width="1.5"/>
    <path d="M 360,120 L 270,120 A 90,90 0 0,1 282.06,75 Z"      fill="#FFFFFF" stroke="#0A80D5" stroke-width="1.5"/>
    <path d="M 360,120 L 282.06,75 A 90,90 0 0,1 315,42.06 Z"    fill="#FFFFFF" stroke="#0A80D5" stroke-width="1.5"/>
    <path d="M 360,120 L 315,42.06 A 90,90 0 0,1 360,30 Z"       fill="#FFFFFF" stroke="#0A80D5" stroke-width="1.5"/>
    <circle cx="360" cy="120" r="90" fill="none" stroke="#0A80D5" stroke-width="2"/>
  </g>

</svg>
