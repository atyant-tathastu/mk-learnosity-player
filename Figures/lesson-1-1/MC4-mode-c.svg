<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" font-family='"Untitled Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>
  <!-- White background -->
  <rect x="0" y="0" width="240" height="240" fill="#FFFFFF"/>

  <!-- Top-left small square: fully shaded -->
  <rect x="0" y="0" width="120" height="120" fill="#8DD5F1"/>

  <!-- Top-right small square: fully shaded -->
  <rect x="120" y="0" width="120" height="120" fill="#8DD5F1"/>

  <!-- Bottom-left small square: white background, upper triangle (above the diagonal from (0,120) to (120,240)) shaded -->
  <rect x="0" y="120" width="120" height="120" fill="#FFFFFF"/>
  <polygon points="0,120 120,120 120,240" fill="#8DD5F1"/>

  <!-- Bottom-right small square: white background, 2x2 grid of tiny squares; top-left tiny shaded -->
  <rect x="120" y="120" width="120" height="120" fill="#FFFFFF"/>
  <rect x="120" y="120" width="60" height="60" fill="#8DD5F1"/>

  <!-- Top-level 2x2 grid lines (stroke over fills) -->
  <line x1="120" y1="0" x2="120" y2="240" stroke="#0A80D5" stroke-width="2"/>
  <line x1="0" y1="120" x2="240" y2="120" stroke="#0A80D5" stroke-width="2"/>

  <!-- Bottom-left diagonal -->
  <line x1="0" y1="120" x2="120" y2="240" stroke="#0A80D5" stroke-width="2"/>

  <!-- Bottom-right 2x2 tiny grid lines -->
  <line x1="180" y1="120" x2="180" y2="240" stroke="#0A80D5" stroke-width="2"/>
  <line x1="120" y1="180" x2="240" y2="180" stroke="#0A80D5" stroke-width="2"/>

  <!-- Outer border of large square -->
  <rect x="0" y="0" width="240" height="240" fill="none" stroke="#0A80D5" stroke-width="2"/>
</svg>
