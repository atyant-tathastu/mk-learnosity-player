<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 300" width="280" height="300" font-family='"Untitled Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>

  <!-- Outer square (8 cm side, 240 px = 30 px per cm) -->
  <rect x="20" y="20" width="240" height="240" fill="#FFFFFF" stroke="#0A80D5" stroke-width="2"/>

  <!-- Kite TRSL (shaded). T=(140,20), R=(260,140), S=(140,200), L=(20,140) -->
  <polygon points="140,20 260,140 140,200 20,140" fill="#8DD5F1" stroke="#0A80D5" stroke-width="2"/>

  <!-- Vertical diagonal TS (dashed) -->
  <line x1="140" y1="20" x2="140" y2="200" stroke="#0A80D5" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- Horizontal diagonal LR (dashed) -->
  <line x1="20" y1="140" x2="260" y2="140" stroke="#0A80D5" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- Midpoint tick marks on top, right, bottom, left sides of the square -->
  <line x1="140" y1="16" x2="140" y2="24" stroke="#0A80D5" stroke-width="2"/>
  <line x1="256" y1="140" x2="264" y2="140" stroke="#0A80D5" stroke-width="2"/>
  <line x1="16" y1="140" x2="24" y2="140" stroke="#0A80D5" stroke-width="2"/>

  <!-- Vertex labels -->
  <text x="140" y="14" text-anchor="middle" font-size="13" fill="#0A80D5" font-weight="bold">T</text>
  <text x="270" y="144" text-anchor="start" font-size="13" fill="#0A80D5" font-weight="bold">R</text>
  <text x="148" y="216" text-anchor="start" font-size="13" fill="#0A80D5" font-weight="bold">S</text>
  <text x="10" y="144" text-anchor="end" font-size="13" fill="#0A80D5" font-weight="bold">L</text>

  <!-- Side length label '8 cm' below the bottom of the square -->
  <text x="140" y="285" text-anchor="middle" font-size="13" fill="#0A80D5">8 cm</text>

  <!-- Diagonal length label '6 cm' next to the vertical diagonal TS -->
  <text x="148" y="115" text-anchor="start" font-size="12" fill="#0A80D5">6 cm</text>
</svg>
