<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" font-family='"Untitled Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>

  <!-- Outer 6x6 square (whole canvas), shaded blue, with rounded corners -->
  <rect x="0" y="0" width="240" height="240" rx="8" ry="8" fill="#8DD5F1"/>

  <!-- Middle 4x4 band carved out as white -->
  <rect x="40" y="40" width="160" height="160" fill="#FFFFFF"/>

  <!-- Inner 2x2 square, shaded blue -->
  <rect x="80" y="80" width="80" height="80" fill="#8DD5F1"/>

  <!-- 6x6 unit-cell grid lines (subtle white-on-blue and faint blue-on-white) -->
  <g stroke="#FFFFFF" stroke-width="1" opacity="0.55">
    <!-- Vertical grid lines -->
    <line x1="40"  y1="0"   x2="40"  y2="240"/>
    <line x1="80"  y1="0"   x2="80"  y2="240"/>
    <line x1="120" y1="0"   x2="120" y2="240"/>
    <line x1="160" y1="0"   x2="160" y2="240"/>
    <line x1="200" y1="0"   x2="200" y2="240"/>
    <!-- Horizontal grid lines -->
    <line x1="0"   y1="40"  x2="240" y2="40"/>
    <line x1="0"   y1="80"  x2="240" y2="80"/>
    <line x1="0"   y1="120" x2="240" y2="120"/>
    <line x1="0"   y1="160" x2="240" y2="160"/>
    <line x1="0"   y1="200" x2="240" y2="200"/>
  </g>

  <!-- Solid borders for each of the three concentric squares -->
  <rect x="80" y="80" width="80"  height="80"  fill="none" stroke="#0A80D5" stroke-width="2.5"/>
  <rect x="40" y="40" width="160" height="160" fill="none" stroke="#0A80D5" stroke-width="2.5"/>
  <rect x="0"  y="0"  width="240" height="240" rx="8" ry="8" fill="none" stroke="#0A80D5" stroke-width="3"/>

</svg>
