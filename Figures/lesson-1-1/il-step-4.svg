<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" width="400" height="180" font-family='"Untitled Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>

  <!-- LEFT PANEL: pie cut into 4 equal slices, top-right shaded -->
  <g>
    <path d="M 90,80 L 90,25 A 55,55 0 0,1 145,80 Z" fill="#8DD5F1" stroke="#0A80D5" stroke-width="2"/>
    <path d="M 90,80 L 145,80 A 55,55 0 0,1 90,135 Z" fill="#FFFFFF" stroke="#0A80D5" stroke-width="2"/>
    <path d="M 90,80 L 90,135 A 55,55 0 0,1 35,80 Z"  fill="#FFFFFF" stroke="#0A80D5" stroke-width="2"/>
    <path d="M 90,80 L 35,80 A 55,55 0 0,1 90,25 Z"   fill="#FFFFFF" stroke="#0A80D5" stroke-width="2"/>
    <circle cx="90" cy="80" r="55" fill="none" stroke="#0A80D5" stroke-width="2"/>
    <text x="90" y="165" text-anchor="middle" font-size="14" fill="#0A80D5" font-weight="bold">Pie</text>
  </g>

  <!-- Divider -->
  <line x1="200" y1="20" x2="200" y2="160" stroke="#D0D0D0" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- RIGHT PANEL: 4 dots in a row, leftmost filled -->
  <g>
    <circle cx="240" cy="80" r="20" fill="#8DD5F1" stroke="#0A80D5" stroke-width="2"/>
    <circle cx="285" cy="80" r="20" fill="#FFFFFF" stroke="#0A80D5" stroke-width="2"/>
    <circle cx="330" cy="80" r="20" fill="#FFFFFF" stroke="#0A80D5" stroke-width="2"/>
    <circle cx="375" cy="80" r="20" fill="#FFFFFF" stroke="#0A80D5" stroke-width="2"/>
    <text x="307" y="165" text-anchor="middle" font-size="14" fill="#0A80D5" font-weight="bold">Dots</text>
  </g>

</svg>
