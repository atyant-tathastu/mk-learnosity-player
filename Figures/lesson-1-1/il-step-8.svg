<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200" font-family='"Untitled Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>

  <!-- Top bar: 3/4 — 4 equal pieces, first 3 shaded -->
  <rect x="40"  y="30" width="120" height="50" fill="#8DD5F1" stroke="#0A80D5" stroke-width="2"/>
  <rect x="160" y="30" width="120" height="50" fill="#8DD5F1" stroke="#0A80D5" stroke-width="2"/>
  <rect x="280" y="30" width="120" height="50" fill="#8DD5F1" stroke="#0A80D5" stroke-width="2"/>
  <rect x="400" y="30" width="120" height="50" fill="#FFFFFF" stroke="#0A80D5" stroke-width="2"/>
  <text x="540" y="63" font-size="18" fill="#2B2B2B" font-weight="600">3/4</text>

  <!-- Bottom bar: 5/6 — 6 equal pieces, first 5 shaded -->
  <rect x="40"  y="110" width="80" height="50" fill="#8DD5F1" stroke="#0A80D5" stroke-width="2"/>
  <rect x="120" y="110" width="80" height="50" fill="#8DD5F1" stroke="#0A80D5" stroke-width="2"/>
  <rect x="200" y="110" width="80" height="50" fill="#8DD5F1" stroke="#0A80D5" stroke-width="2"/>
  <rect x="280" y="110" width="80" height="50" fill="#8DD5F1" stroke="#0A80D5" stroke-width="2"/>
  <rect x="360" y="110" width="80" height="50" fill="#8DD5F1" stroke="#0A80D5" stroke-width="2"/>
  <rect x="440" y="110" width="80" height="50" fill="#FFFFFF" stroke="#0A80D5" stroke-width="2"/>
  <text x="540" y="143" font-size="18" fill="#2B2B2B" font-weight="600">5/6</text>

</svg>
