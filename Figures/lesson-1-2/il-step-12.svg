<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 642 352" width="642" height="352" style="font-family:-apple-system,Segoe UI,sans-serif" preserveAspectRatio="xMidYMid meet"><rect width="642" height="352" fill="#FFFFFF"/><rect x="16" y="16" width="610" height="64" fill="#EBBDEC" stroke="#850F85" stroke-width="1.5" rx="0" ry="0"/><text x="131.0" y="53.0" font-size="15" fill="#2B2B2B" text-anchor="middle" font-weight="700" font-family="Untitled Sans, -apple-system, sans-serif">Operation</text><text x="436.0" y="53.0" font-size="15" fill="#2B2B2B" text-anchor="middle" font-weight="700" font-family="Untitled Sans, -apple-system, sans-serif">Rule</text><rect x="16" y="80" width="610" height="64" fill="#FFFFFF" stroke="#850F85" stroke-width="1" rx="0" ry="0"/><text x="131.0" y="117.0" font-size="14" fill="#2B2B2B" text-anchor="middle" font-weight="600" font-family="Untitled Sans, -apple-system, sans-serif">Multiply two fractions</text><text x="436.0" y="117.0" font-size="13" fill="#2B2B2B" text-anchor="middle" font-weight="500" font-family="Untitled Sans, -apple-system, sans-serif">Tops × tops, bottoms × bottoms</text><rect x="16" y="144" width="610" height="64" fill="#FFFFFF" stroke="#850F85" stroke-width="1" rx="0" ry="0"/><text x="131.0" y="181.0" font-size="14" fill="#2B2B2B" text-anchor="middle" font-weight="600" font-family="Untitled Sans, -apple-system, sans-serif">Fraction of a number</text><text x="436.0" y="181.0" font-size="13" fill="#2B2B2B" text-anchor="middle" font-weight="500" font-family="Untitled Sans, -apple-system, sans-serif">'Of' means ×</text><rect x="16" y="208" width="610" height="64" fill="#FFFFFF" stroke="#850F85" stroke-width="1" rx="0" ry="0"/><text x="131.0" y="245.0" font-size="14" fill="#2B2B2B" text-anchor="middle" font-weight="600" font-family="Untitled Sans, -apple-system, sans-serif">Fraction of the rest</text><text x="436.0" y="245.0" font-size="13" fill="#2B2B2B" text-anchor="middle" font-weight="500" font-family="Untitled Sans, -apple-system, sans-serif">Multiply the leftover fractions</text><rect x="16" y="272" width="610" height="64" fill="#FFFFFF" stroke="#850F85" stroke-width="1" rx="0" ry="0"/><text x="131.0" y="309.0" font-size="14" fill="#2B2B2B" text-anchor="middle" font-weight="600" font-family="Untitled Sans, -apple-system, sans-serif">Divide two fractions</text><text x="436.0" y="309.0" font-size="13" fill="#2B2B2B" text-anchor="middle" font-weight="500" font-family="Untitled Sans, -apple-system, sans-serif">Flip the second, then ×</text></svg>